<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
      font-size: 13px; color: #222;
      background: #f5f5f5;
      display: flex; flex-direction: column; height: 100vh; overflow: hidden;
    }

    /* 상단바 */
    .top-bar {
      background: #fff; border-bottom: 1px solid #e5e5e5;
      padding: 8px 10px;
      display: flex; align-items: center; gap: 6px; flex-shrink: 0;
    }
    .top-bar input {
      flex: 1; border: 1px solid #ddd; border-radius: 6px;
      padding: 5px 8px; font-size: 12px; outline: none;
    }
    .top-bar input:focus { border-color: #333; }
    .channel-select {
      border: 1px solid #ddd; border-radius: 6px;
      padding: 5px 6px; font-size: 11px; font-weight: 600;
      color: #444; background: #f8f8f8; cursor: pointer; outline: none;
    }
    .btn-figma {
      background: #f3f0ff; color: #6a50ee;
      border: 1px solid #e0d9ff; border-radius: 6px;
      padding: 5px 10px; font-size: 11px; font-weight: 600;
      cursor: pointer; white-space: nowrap;
    }
    .btn-figma:hover { background: #ebe5ff; }
    .btn-figma:disabled { opacity: 0.5; cursor: not-allowed; }

    /* 이미지 바 */
    .image-bar {
      background: #fff; border-bottom: 1px solid #eee;
      padding: 6px 10px;
      display: none; align-items: center; gap: 8px; flex-shrink: 0;
    }
    .image-bar.visible { display: flex; }
    .image-bar img {
      width: 36px; height: 36px; object-fit: cover;
      border-radius: 4px; border: 1px solid #eee; cursor: pointer;
    }
    .image-bar .info { flex: 1; min-width: 0; }
    .image-bar .info strong { display: block; font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .image-bar .info span { font-size: 11px; color: #888; }
    .btn-clear { background: none; border: none; color: #aaa; cursor: pointer; font-size: 12px; }
    .btn-clear:hover { color: #e53e3e; }

    /* 액션 버튼 바 */
    .action-bar {
      background: #fff; border-bottom: 1px solid #eee;
      padding: 8px 10px;
      display: none; gap: 8px; flex-shrink: 0;
    }
    .action-bar.visible { display: flex; }
    .btn-action {
      flex: 1; padding: 9px 6px; border-radius: 8px;
      font-size: 12px; font-weight: 700; cursor: pointer;
      border: none; transition: opacity 0.15s;
    }
    .btn-action:hover { opacity: 0.85; }
    .btn-action:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-review {
      background: #1a1a2e; color: #fff;
    }
    .btn-draft {
      background: #2d6a4f; color: #fff;
    }

    /* 채팅 영역 */
    .chat-area {
      flex: 1; overflow-y: auto; padding: 12px 10px;
      display: flex; flex-direction: column; gap: 10px;
      min-height: 0;
    }
    .empty-state {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      color: #bbb; text-align: center; gap: 8px; padding: 20px;
    }
    .empty-icon { font-size: 32px; }
    .empty-state p { font-size: 12px; line-height: 1.8; }

    .bubble-wrap { display: flex; flex-direction: column; gap: 4px; }
    .bubble {
      padding: 9px 12px; border-radius: 10px;
      font-size: 12px; line-height: 1.65; max-width: 100%;
      white-space: pre-wrap; word-break: break-word;
    }
    .bubble.user {
      background: #1a1a2e; color: #fff;
      align-self: flex-end; max-width: 85%;
    }
    .bubble.assistant {
      background: #fff; border: 1px solid #e8e8e8;
      align-self: flex-start;
    }
    .bubble.typing {
      background: #fff; border: 1px solid #e8e8e8;
      color: #aaa; align-self: flex-start;
    }
    .spinner {
      display: inline-block; width: 10px; height: 10px;
      border: 2px solid #ddd; border-top-color: #555;
      border-radius: 50%; animation: spin 0.7s linear infinite;
      vertical-align: middle; margin-right: 5px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* 버블 액션 */
    .bubble-actions {
      display: flex; gap: 6px; flex-wrap: wrap;
    }
    .action-btn {
      background: #f5f5f5; border: 1px solid #e0e0e0;
      border-radius: 6px; padding: 4px 10px;
      font-size: 11px; cursor: pointer; color: #555;
    }
    .action-btn:hover { background: #ebebeb; }
    .action-btn.primary { background: #1a1a2e; color: #fff; border-color: #1a1a2e; }
    .action-btn.primary:hover { background: #16213e; }

    /* TSV 결과 테이블 */
    .tsv-table { width: 100%; border-collapse: collapse; font-size: 11px; margin-top: 6px; }
    .tsv-table th, .tsv-table td {
      border: 1px solid #ddd; padding: 5px 7px;
      text-align: left; vertical-align: top; line-height: 1.5;
    }
    .tsv-table th { background: #f0f0f0; font-weight: 700; white-space: nowrap; }
    .tsv-table tr:nth-child(even) td { background: #fafafa; }

    /* 상태바 */
    .status-bar {
      text-align: center; font-size: 11px; color: #aaa;
      padding: 3px 10px; flex-shrink: 0; min-height: 18px;
    }
    .status-bar.error { color: #e53e3e; }

    /* 입력창 */
    .input-wrap {
      background: #fff; border-top: 1px solid #e5e5e5;
      padding: 8px 10px; flex-shrink: 0;
      display: flex; gap: 6px; align-items: flex-end;
    }
    .input-wrap textarea {
      flex: 1; border: 1px solid #ddd; border-radius: 8px;
      padding: 7px 10px; font-size: 12px; font-family: inherit;
      resize: none; outline: none; min-height: 34px; max-height: 80px;
      line-height: 1.5;
    }
    .input-wrap textarea:focus { border-color: #333; }
    .btn-send {
      background: #1a1a2e; color: #fff; border: none;
      border-radius: 8px; width: 34px; height: 34px;
      font-size: 16px; cursor: pointer; flex-shrink: 0;
    }
    .btn-send:hover { background: #16213e; }
    .btn-send:disabled { opacity: 0.4; cursor: not-allowed; }
  </style>
</head>
<body>

<!-- 상단바 -->
<div class="top-bar">
  <input type="password" id="apiKey" placeholder="OpenAI API 키 (sk-...)" />
  <select id="channelSelect" class="channel-select" onchange="onChannelChange()">
    <option value="공통">공통</option>
    <option value="MTS">MTS</option>
    <option value="HTS">HTS</option>
    <option value="홈페이지">홈페이지</option>
    <option value="신한i">신한i</option>
  </select>
  <button class="btn-figma" id="btnFigma" onclick="extractFromFigma()">📐 피그마</button>
</div>

<!-- 이미지 바 -->
<div class="image-bar" id="imageBar">
  <img id="imageThumb" src="" onclick="this.style.width = this.style.width === '100%' ? '36px' : '100%'" />
  <div class="info">
    <strong id="imageName">화면</strong>
    <span id="imageCount">준비 완료</span>
  </div>
  <button class="btn-clear" onclick="clearAll()">✕ 제거</button>
</div>

<!-- 액션 버튼 바 -->
<div class="action-bar" id="actionBar">
  <button class="btn-action btn-review" id="btnReview" onclick="runReview()">검토</button>
  <button class="btn-action btn-draft" id="btnDraft" onclick="runDraft()">초안 작성</button>
</div>

<!-- 채팅 -->
<div class="chat-area" id="chatArea">
  <div class="empty-state" id="emptyState">
    <div class="empty-icon">📋</div>
    <p>피그마에서 화면을 가져온 후<br/><strong>검토</strong> 또는 <strong>초안 작성</strong>을 선택하세요</p>
  </div>
</div>

<div class="status-bar" id="statusBar"></div>

<!-- 입력창 -->
<div class="input-wrap">
  <textarea id="userInput" placeholder="추가 요청사항 입력 후 전송..." rows="1"
    onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
  <button class="btn-send" id="btnSend" onclick="sendMessage()">↑</button>
</div>

<script>
const SYSTEM_PROMPTS = {"공통": "당신은 TC(테스트케이스) 작성 전문가입니다. 화면 캡처를 분석하고 아래 규칙에 따라 TC를 작성합니다.\n\n## 출력 컬럼 (5개만 사용, TSV 형식으로 출력)\n- 화면구분1: 페이지 또는 화면 단위 구분 작성 (예: 해외주식 투자정보)\n- 화면구분2: 화면 내 검증 대상 영역 또는 업무 구분 작성 (예: 조회 조건)\n- 테스트 구분: UI, 조회, 처리 중 하나만 작성 (예: 조회)\n- 테스트 시나리오: 테스트 수행을 위한 트리거 행위 중심 작성 (예: [조회] 버튼 선택)\n- 예상 결과: 테스트 수행 후 확인 가능한 결과 상태 작성 (예: 일자, 제목, 작성자 데이터 정상 노출)\n- 출력 제외 컬럼: TC ID, 화면명, 테스트 스텝, 사전조건, 비고 등 지정 외 컬럼 미작성 (예: 지정 컬럼 외 미작성)\n- 컬럼 순서: 화면구분1, 화면구분2, 테스트 구분, 테스트 시나리오, 예상 결과 순서 유지 (예: 지정 순서 유지)\n- 셀 작성 방식: 각 셀에는 하나의 항목만 작성 (예: 계좌 선택)\n- 셀 내부 표기: 셀 내부 번호, 불릿, 목록 기호 미사용 (예: 조회 조건 선택)\n- 문장 형식: 모든 컬럼 값은 명사형 어미로 작성 (예: 데이터 정상 노출)\n- 테스트 시나리오 버튼 표기: 버튼명은 대괄호로 표기 (예: [다음] 버튼 선택)\n- 테스트 시나리오 선택 표현: 클릭, 탭보다 선택 표현 사용 (예: 항목 선택)\n- 테스트 시나리오 입력 표현: 사용자 입력은 항목명 입력 형태로 작성 (예: 금액 입력)\n- 테스트 시나리오 조회 표현: 조회 실행은 [조회] 버튼 선택 또는 조회 조건 선택 형태로 작성 (예: 조회 기간 선택 후 [조회] 버튼 선택)\n- 예상 결과 데이터 표현: 데이터, 목록, 테이블, 컬럼 항목은 정상 노출로 작성 (예: 거래일, 종목명, 거래금액 데이터 정상 노출)\n- 예상 결과 문구 표현: 안내 문구, 오류 메시지, 유의사항은 정상 노출로 작성 (예: 오류 메시지 정상 노출)\n- 예상 결과 화면 표현: 화면, 상세 화면, 완료 화면은 정상 호출로 작성 (예: 상세 화면 정상 호출)\n- 예상 결과 팝업 표현: 팝업, 바텀시트, 레이어는 정상 호출로 작성 (예: 확인 팝업 정상 호출)\n- 예상 결과 반영 표현: 입력 값, 상태값, 설정값, 처리 결과는 정상 반영으로 작성 (예: 입력 값 정상 반영)\n- 예상 결과 연결 표현: 외부 시스템, 인증, 서비스 연계 등은 정상 연결로 작성 (예: 인증 화면 정상 연결)\n- 데이터 항목 확인 가능: 화면 캡처, 도움말, 설계서, 보충 설명에서 확인 가능한 데이터 항목명을 예상 결과에 명시 (예: 신청일, 상품명, 처리상태 데이터 정상 노출)\n- 데이터 항목 확인 불가: 세부 데이터 항목명이 확인되지 않는 경우 일반 표현 사용 (예: 조회 결과 목록 정상 노출)\n- 확인 불가 출력: 자료에서 식별 불가한 항목은 확인 불가로 분리 (예: 확인 불가)\n- 동일 예상 결과 통합: 예상 결과가 동일한 항목은 가능한 범위에서 통합 작성 (예: 약관 항목 선택 | PDF 정상 호출)\n- 공통 UI 출력 제외: 단순 닫기, 이전, 뒤로가기, 화면 진입, 스크롤, 딤 처리는 출력하지 않음 (예: 미작성)\n- MTS 출력 기준: MTS 하단 선택 UI는 바텀시트로 작성 (예: 계좌 선택 바텀시트 정상 호출)\n- HTS 출력 기준: HTS 화면은 조회 조건, 결과 리스트, 상세 데이터 등 PC 화면 구조가 드러나도록 작성 (예: 결과 리스트)\n- 홈페이지 출력 기준: 홈페이지 화면은 화면 호출, 문서 호출, 조회 결과 노출 기준으로 작성 (예: 약관 문서 정상 호출)\n- 시나리오 결과 일치: 예상 결과는 테스트 시나리오의 수행 행위로 직접 확인 가능한 결과만 작성 (예: [확인] 버튼 선택 | 완료 화면 정상 호출)\n- 복합 시나리오 출력: 후속 행위 결과까지 검증하는 경우 테스트 시나리오에 후속 행위를 포함 (예: [확인] 버튼 선택 후 [자세히 보기] 버튼 선택 | 내역 화면 정상 호출)\n- 단계 분리 출력: 각 단계의 예상 결과가 다른 경우 TC를 분리 작성 (예: [확인] 버튼 선택 | 완료 화면 정상 호출)\n\n## 판단규칙 (테스트구분: UI/조회/처리 중 하나만)\n- [R001][조회] 조건 선택 후 데이터 변경: 선택한 조건에 따라 화면 내 데이터가 변경됨 → 시나리오: {조건명} 선택 / 예상결과: {데이터명} 데이터 정상 노출\n- [R002][조회] 조회 버튼 선택 후 목록 조회: [조회] 버튼 선택 후 조건 기준 결과 목록이 조회됨 → 시나리오: [조회] 버튼 선택 / 예상결과: 조회 결과 목록 정상 노출\n- [R003][조회] 필터 변경 후 데이터 재조회: 필터값 변경 시 결과 데이터가 재조회됨 → 시나리오: {필터명} 선택 / 예상결과: 필터 기준 데이터 정상 노출\n- [R004][조회] 탭 선택 후 데이터 변경: 탭 선택 시 화면 내 조회 데이터가 변경됨 → 시나리오: {탭명} 탭 선택 / 예상결과: {탭명} 기준 데이터 정상 노출\n- [R005][조회] 계좌 선택 후 정보 조회: 계좌 선택 시 해당 계좌 기준 정보가 노출됨 → 시나리오: 계좌 선택 / 예상결과: 계좌 기준 데이터 정상 노출\n- [R006][조회] 종목 선택 후 정보 조회: 종목 선택 시 해당 종목 기준 정보가 노출됨 → 시나리오: 종목 선택 / 예상결과: 종목 정보 데이터 정상 노출\n- [R007][조회] 상세정보 조회: 목록 또는 항목 선택 시 상세 데이터가 노출됨 → 시나리오: {항목명} 선택 / 예상결과: 상세 데이터 정상 노출\n- [R008][UI] 목록 항목 선택 후 상세 화면 호출: 목록 항목 선택 시 별도 상세 화면이 호출됨 → 시나리오: 목록 항목 선택 / 예상결과: 상세 화면 정상 호출\n- [R009][UI] 버튼 선택 후 화면 호출: 버튼 선택 시 다음 화면 또는 별도 화면이 호출됨 → 시나리오: [{버튼명}] 버튼 선택 / 예상결과: {화면명} 화면 정상 호출\n- [R010][UI] 버튼 선택 후 팝업 호출: 버튼 선택 시 단순 안내 또는 정보 팝업이 호출됨 → 시나리오: [{버튼명}] 버튼 선택 / 예상결과: {팝업명} 팝업 정상 호출\n- [R011][UI] 약관 또는 문서 호출: 약관, 설명서, PDF, 문서 보기 선택 시 문서가 호출됨 → 시나리오: {문서명} 선택 / 예상결과: {문서명} 정상 호출\n- [R012][UI] 안내 문구 노출: 항목 선택 또는 조건 변경 시 안내 문구가 노출됨 → 시나리오: {항목명} 선택 / 예상결과: 안내 문구 정상 노출\n- [R013][UI] 입력 항목 선택 후 선택 UI 호출: 입력 항목 선택 시 선택 가능한 UI가 호출됨 → 시나리오: {항목명} 선택 / 예상결과: {선택UI명} 정상 호출\n- [R015][처리] 입력 값 화면 반영: 사용자가 입력한 값이 화면에 반영됨 → 시나리오: {항목명} 입력 / 예상결과: 입력 값 정상 반영\n- [R016][처리] 입력 값 다음 단계 반영: 사용자 입력 값이 다음 단계 또는 확인 화면에 반영됨 → 시나리오: {항목명} 입력 후 [{버튼명}] 버튼 선택 / 예상결과: 입력 값 정상 반영\n- [R017][처리] 필수값 미입력 오류: 필수 입력값 누락 후 처리 버튼 선택 시 오류 메시지가 노출됨 → 시나리오: 필수값 미입력 후 [{버튼명}] 버튼 선택 / 예상결과: 오류 메시지 정상 노출\n- [R018][처리] 입력 형식 오류: 입력 형식이 맞지 않는 값 입력 후 오류 메시지가 노출됨 → 시나리오: 유효하지 않은 값 입력 후 [{버튼명}] 버튼 선택 / 예상결과: 오류 메시지 정상 노출\n- [R019][처리] 입력 범위 오류: 최소값 또는 최대값 범위를 벗어난 입력 시 오류 메시지가 노출됨 → 시나리오: 범위 외 값 입력 후 [{버튼명}] 버튼 선택 / 예상결과: 오류 메시지 정상 노출\n- [R020][처리] 잔고 또는 가능금액 초과 오류: 보유 잔고, 가능금액, 가능수량을 초과한 입력 시 오류 메시지가 노출됨 → 시나리오: 가능 범위 초과 동작 제외. 예: 상단 X 선택\n- 이전 버튼 (이전 화면 이동만 수행): 공통 이동 동작 제외. 예: [이전] 버튼 선택\n- 뒤로가기 (이전 화면 이동만 수행): 공통 이동 동작 제외. 예: 뒤로가기 선택\n- 단순 확인 버튼 (확인 선택 시 팝업 종료만 수행): 공통 종료 동작 제외. 예: [확인] 버튼 선택\n- 화면 진입 (화면 최초 진입 구성 확인만 수행): 공통 진입 동작 제외. 예: 화면 진입 시 구성 확인\n- 스크롤 (화면 스크롤 동작만 확인): 작성 제외 항목. 예: 스크롤 동작 확인\n- 딤 처리 (팝업 배경 딤 노출 여부만 확인): 작성 제외 항목. 예: 딤 영역 노출 확인\n- 화면 스타일 (색상, 간격, 정렬 등 디자인 표현만 확인): 기능 검증 대상 제외. 예: 버튼 색상 확인\n- 이미지 장식 요소 (일러스트, 배너, 아이콘 등 단순 장식 요소만 확인): 기능 검증 대상 제외. 예: 일러스트 노출 확인\n- 로딩 표시 (일시적인 로딩 표시만 확인): 공통 시스템 동작 제외. 예: 로딩 스피너 노출 확인\n- 포커스 스타일 (선택 또는 입력 시 포커스 스타일만 변경): 디자인성 인터랙션 제외. 예: 입력 필드 포커스 확인\n- 단순 마우스 오버 (마우스 오버 시 색상 또는 스타일만 변경): 디자인성 인터랙션 제외. 예: 마우스 오버 스타일 확인\n- 단순 활성화 상태 (기능 흐름 없이 버튼 활성화 상태만 확인): 단독 TC 작성 제외. 예: 버튼 활성화 상태 확인\n- 단순 비활성화 상태 (기능 흐름 없이 버튼 비활성화 상태만 확인): 단독 TC 작성 제외. 예: 버튼 비활성화 상태 확인\n- 설계서 미기재 기능 (화면 캡처, 도움말, 설계서, 보충 설명에서 확인되지 않는 기능): 추정 작성 방지. 예: 자동 계산 기능 추정 작성\n- 확인 불가 데이터 항목 (컬럼명 또는 데이터 항목명이 확인되지 않음): 데이터 항목 추정 방지. 예: 일자, 제목, 작성자 임의 작성\n- 중복 예상 결과 (서로 다른 시나리오의 예상 결과가 동일함): TC 과다 분리 방지. 예: 약관별 PDF 노출 개별 작성\n- 공통 안내 문구 (여러 화면에 반복되는 일반 안내 문구만 확인): 중복 TC 방지. 예: 공통 유의사항 문구 노출\n- 단순 유의사항 영역 (내용 확인만 가능하고 기능 흐름이 없음): 단순 콘텐츠 확인 제외. 예: 유의사항 내용 확인\n- 공통 계좌선택 반복 (이미 동일 프로세스로 작성된 계좌선택 UI): 공통 UI 중복 작성 방지. 예: 계좌 선택 팝업 호출\n- 공통 약관 보기 반복 (동일한 문서 호출 구조가 반복됨): 동일 예상 결과 통합. 예: 약관별 PDF 호출 개별 작성\n- 단순 메뉴 이동 (메뉴 선택 후 화면 호출만 수행하며 업무 검증이 없음): 공통 이동 동작 제외. 예: 메뉴 선택\n- 공통 검색창 진입 (검색창 선택 후 검색 화면 호출만 수행): 공통 진입 동작 제외. 예: 검색창 선택\n- 단순 새로고침 (새로고침만 수행하고 별도 데이터 조건 검증이 없음): 공통 동작 제외. 예: 새로고침 선택\n- 단순 공유 기능 (공유 UI 호출만 확인): 공통 OS 기능 제외. 예: [공유] 버튼 선택\n- 단순 복사 기능 (복사 완료 토스트만 확인): 공통 유틸 기능 제외. 예: [복사] 버튼 선택\n- 토스트 단독 노출 (기능 처리 없이 단순 안내 토스트만 노출): 단독 TC 작성 제외. 예: 토스트 메시지 노출\n- 문구 맞춤법 검토 (문구의 맞춤법 또는 띄어쓰기만 확인): 콘텐츠 검수 대상 제외. 예: 안내 문구 띄어쓰기 확인\n\n## 작성규칙 (문장 형식 기준)\n- [작성 컬럼] TC 출력 컬럼은 화면구분1, 화면구분2, 테스트 구분, 테스트 시나리오, 예상 결과만 사용. 예: 화면구분1 | 화면구분2 | 테스트 구분 | 테스트 시나리오 | 예상 결과\n- [컬럼 제외] TC ID, 화면명, 테스트 스텝, 사전조건, 비고 등 지정 외 컬럼은 작성하지 않음. 예: 지정 컬럼 외 미작성\n- [셀 작성 기준] 각 셀에는 한 개의 항목만 작성. 예: 계좌 선택\n- [셀 내부 형식] 셀 내부 줄바꿈, 번호, 목록 기호는 사용하지 않음. 예: 조회 조건 선택\n- [문장 형식] 모든 항목은 명사형 어미로 작성. 예: 데이터 정상 노출\n- [문장 길이] 문장은 간결하고 QA 검증 가능한 수준으로 작성. 예: 조회 결과 목록 정상 노출\n- [테스트 구분] 테스트 구분은 UI, 조회, 처리 중 하나만 사용. 예: 조회\n- [테스트 구분 제외] 검증, 예외, 정상, 공통 등은 테스트 구분에 사용하지 않음. 예: 처리\n- [테스트 시나리오 기준] 테스트 시나리오는 트리거가 되는 행위까지만 작성. 예: [조회] 버튼 선택\n- [테스트 시나리오 제외] 테스트 시나리오에 예상 결과를 함께 작성하지 않음. 예: 목록 항목 선택\n- [예상 결과 기준] 예상 결과는 테스트 수행 후 확인 가능한 상태로 작성. 예: 상세 화면 정상 호출\n- [예상 결과 표현] 예상 결과는 정상 노출, 정상 반영, 정상 호출 형태로 작성. 예: 입력 값 정상 반영\n- [버튼 표기] 버튼명은 대괄호로 표기. 예: [다음] 버튼 선택\n- [선택 표현] 클릭 또는 선택을 사용. 예: 항목 선택\n- [입력 표현] 사용자 입력 항목은 항목명 입력 형태로 작성. 예: 금액 입력\n- [데이터 표현] 조회 또는 결과 검증 목적은 데이터 정상 노출 형태로 작성. 예: 계좌 정보 데이터 정상 노출\n- [반영 표현] 입력 또는 처리 결과 검증 목적은 정상 반영 형태로 작성. 예: 상태값 정상 반영\n- [화면 표현] 화면 전환 또는 상세 화면 표시 목적은 화면 정상 호출 형태로 작성. 예: 상세 화면 정상 호출\n- [팝업 표현] 팝업 표시 목적은 팝업 정상 호출 형태로 작성. 예: 안내 팝업 정상 호출\n- [문구 표현] 안내 문구, 오류 메시지, 유의사항 등 텍스트 표시 목적은 정상 노출 형태로 작성. 예: 오류 메시지 정상 노출\n- [확인 불가 처리] 제공 자료에서 확인되지 않는 항목은 추정하지 않고 확인 불가로 분리. 예: 확인 불가\n- [추정 금지] 화면 캡처, 도움말, 설계서, 보충 설명에 없는 기능은 작성하지 않음. 예: 미확인 기능 미작성\n- [동일 결과 통합] 시나리오별 예상 결과가 동일한 경우 가능한 범위에서 통합 작성. 예: 약관 항목 선택 | PDF 정상 호출\n- [예상 결과 상태 표현] 예상 결과는 시스템이 보여야 하는 상태 또는 반영 결과 중심으로 작성. 예: 처리 결과 정상 반영\n- [모호 표현 지양] 가능, 동작, 발생 등 모호한 표현은 최소화. 예: 버튼 동작 확인 미사용\n- [화면구분1 기준] 화면구분1은 페이지 또는 화면 단위로 작성. 예: 해외주식 투자정보\n- [화면구분2 기준] 화면구분2는 화면 내 검증 대상 영역 기준으로 작성. 예: 조회 조건\n- [금융 데이터 표현] 금액, 수량, 비율, 단위, 상태값은 데이터 정합성 검증 대상으로 작성. 예: 금액 데이터 정상 노출\n- [입력값 정합성] 사용자 입력값이 다음 단계 또는 결과 화면에 동일하게 반영되는지 작성. 예: 입력 값 정상 반영\n- [상태값 정합성] 신청, 해지, 등록, 완료, 실패 등 상태값은 처리 결과 기준으로 작성. 예: 처리 상태값 정상 반영\n- [용어 통일] 용어사전에 정의된 표준용어를 우선 사용. 예: 입력 값\n- [화면구분2 기준] 화면구분2는 화면 내 검증 대상 영역 기준으로 작성. 예: 조회 조건\n- [데이터 항목 명시] 조회 결과 또는 테이블 데이터는 확인 가능한 항목명을 예상 결과에 명시. 예: 일자, 제목, 작성자 데이터 정상 노출\n- [데이터 항목 추정 금지] 확인되지 않은 데이터 항목명은 예상 결과에 임의로 작성하지 않음. 예: 조회 결과 목록 정상 노출\n- [시나리오 결과 일치] 예상 결과는 테스트 시나리오에 작성된 행위로 확인 가능한 결과만 작성. 예: [확인] 버튼 선택 | 완료 화면 정상 호출\n- [복합 행위 작성] 예상 결과가 후속 행위 결과를 포함해야 하는 경우 테스트 시나리오에 후속 행위까지 작성. 예: [확인] 버튼 선택 후 [자세히 보기] 버튼 선택 | 내역 화면 정상 호출\n- [후속 행위 분리] 완료 화면 호출과 후속 화면 이동처럼 검증 결과가 다른 경우 별도 TC로 분리. 예: [확인] 버튼 선택 | 완료 화면 정상 호출\n\n## 용어사전 (표준 용어 사용)\n- 표준:선택 / 금지:클릭, 탭 / 기준:사용자 액션 표현은 선택으로 통일\n- 표준:[OO] 버튼 선택 / 금지:OO 버튼 클릭, OO 버튼 탭 / 기준:버튼 선택 시 버튼명은 대괄호로 표기\n- 표준:입력 / 금지:작성, 기입 / 기준:사용자가 값을 넣는 행위에 사용\n- 표준:입력 값 / 금지:입력값 / 기준:사용자가 입력한 값 자체를 지칭할 때 사용\n- 표준:조회 조건 / 금지:조회조건 / 기준:조회 기준이 되는 조건 영역 또는 항목에 사용\n- 표준:조회 결과 / 금지:검색 결과 / 기준:조회 수행 후 노출되는 결과 영역에 사용\n- 표준:데이터 정상 노출 / 금지:데이터 노출 확인, 데이터 표시됨 / 기준:조회성 데이터가 화면에 표시되는 예상 결과에 사용\n- 표준:문구 정상 노출 / 금지:문구 노출 확인, 문구 표시됨 / 기준:안내 문구, 오류 메시지, 유의사항 텍스트에 사용\n- 표준:화면 정상 호출 / 금지:화면 이동 확인, 화면 노출 확인 / 기준:상세 화면, 완료 화면 등 화면 단위가 호출되는 경우 사용\n- 표준:팝업 정상 호출 / 금지:팝업 노출 확인, 팝업 발생 / 기준:팝업, 레이어, 모달이 호출되는 경우 사용\n- 표준:정상 반영 / 금지:반영 확인, 반영됨 / 기준:입력 값, 설정값, 상태값, 처리 결과가 적용되는 경우 사용\n- 표준:정상 연결 / 금지:연결 확인, 이동 확인 / 기준:인증, 외부 시스템, 서비스 연계 등 연결 검증 시 사용\n- 표준:상태값 / 금지:상태 값 / 기준:신청, 완료, 해지, 실패 등 업무 상태 데이터에 사용\n- 표준:설정값 / 금지:설정 값 / 기준:알림, 토글, 옵션 등 사용자 설정 결과에 사용\n- 표준:처리 결과 / 금지:처리결과 / 기준:신청, 등록, 변경, 해지, 주문 등 처리 후 결과에 사용\n- 표준:오류 메시지 / 금지:에러 메시지, 오류문구 / 기준:입력 오류, 인증 실패, 조건 미충족 시 노출 문구에 사용\n- 표준:안내 문구 / 금지:안내문구 / 기준:사용자에게 안내하는 텍스트에 사용\n- 표준:유의사항 / 금지:주의사항 / 기준:화면 내 유의 내용 영역에 사용\n- 표준:목록 / 금지:리스트 / 기준:조회 결과가 행 단위로 나열되는 경우 사용\n- 표준:상세 데이터 / 금지:상세정보, 상세 정보 / 기준:항목 선택 후 상세 항목이 화면 내 표시되는 경우 사용\n- 표준:상세 화면 / 금지:상세정보 화면, 상세페이지 / 기준:별도 상세 화면이 호출되는 경우 사용\n- 표준:완료 화면 / 금지:완료페이지, 완료 팝업 / 기준:처리 완료 후 호출되는 화면에 사용\n- 표준:확인 팝업 / 금지:재확인 팝업, 컨펌 팝업 / 기준:처리 전 사용자 확인을 요구하는 팝업에 사용\n- 표준:PDF 정상 호출 / 금지:PDF 노출 확인, PDF 표시 / 기준:약관, 설명서 등 PDF 문서 호출 시 사용\n- 표준:문서 정상 호출 / 금지:문서 노출 확인, 새창 표시 / 기준:약관, 설명서, 안내문 등 문서 호출 시 사용\n- 표준:계좌 선택 / 금지:계좌선택 / 기준:계좌를 선택하는 액션 또는 영역에 사용\n- 표준:종목 선택 / 금지:종목선택 / 기준:주식, ETF, 해외주식 등 종목을 선택하는 액션에 사용\n- 표준:상품 선택 / 금지:상품선택 / 기준:금융상품, 연금상품 등 상품을 선택하는 액션에 사용\n- 표준:조회 기간 / 금지:조회기간 / 기준:조회 기준 기간에 사용\n- 표준:거래 내역 / 금지:거래내역 / 기준:거래 관련 목록 또는 상세 데이터에 사용\n- 표준:신청 내역 / 금지:신청내역 / 기준:신청 관련 목록 또는 상세 데이터에 사용\n- 표준:보유 정보 / 금지:보유정보 / 기준:잔고, 보유수량, 평가금액 등 보유 관련 데이터에 사용\n- 표준:상품 정보 / 금지:상품정보 / 기준:상품명, 상품유형, 위험등급 등 상품 관련 데이터에 사용\n- 표준:금액 데이터 / 금지:금액 정보 / 기준:금액, 평가금액, 가능금액, 수수료 등 금액 항목에 사용\n- 표준:수량 데이터 / 금지:수량 정보 / 기준:보유수량, 주문수량, 가능수량 등 수량 항목에 사용\n- 표준:비율 데이터 / 금지:비율 정보 / 기준:수익률, 비중, 금리, 비율 항목에 사용\n- 표준:일자 데이터 / 금지:날짜 데이터 / 기준:신청일, 해지일, 만기일, 거래일 등 일자 항목에 사용\n- 표준:내역 없음 문구 / 금지:데이터 없음, 결과 없음 / 기준:조회 결과가 없는 상태 문구에 사용\n- 표준:전체 동의 / 금지:모두 동의, 일괄 동의 / 기준:약관 또는 동의 항목 전체 선택에 사용\n- 표준:필수 동의 / 금지:필수 약관 체크 / 기준:필수 약관 또는 동의 항목에 사용\n- 표준:선택 상태 / 금지:체크 상태, 선택값 / 기준:체크박스, 라디오, 옵션 선택 결과에 사용\n- 표준:인증 진행 / 금지:인증 수행, 인증하기 / 기준:인증 절차를 수행하는 시나리오에 사용\n- 표준:인증 결과 / 금지:인증상태, 인증 성공 여부 / 기준:인증 완료 또는 실패 결과에 사용\n- 표준:주문 정보 / 금지:주문정보 / 기준:주문 입력 후 확인되는 정보에 사용\n- 표준:주문 결과 / 금지:주문결과 / 기준:주문 실행 후 처리 결과에 사용\n- 표준:가능금액 / 금지:가능 금액 / 기준:주문, 이체, 신청 등 가능 한도 금액에 사용\n- 표준:가능수량 / 금지:가능 수량 / 기준:주문 또는 신청 가능 수량에 사용\n- 표준:처리상태 / 금지:처리 상태 / 기준:신청, 완료, 실패 등 처리 상태 컬럼에 사용\n- 표준:비노출 / 금지:비 노출 / 기준:화면에 표시되지 않는 상태를 표현할 때 사용\n- 표준:미입력 / 금지:미 입력 / 기준:필수값이 입력되지 않은 상태에 사용\n- 표준:직접입력 / 금지:직접 입력 / 기준:사용자가 직접 값을 입력하는 옵션명 또는 항목명에 사용\n- 표준:선택 시 / 금지:선택시 / 기준:조건 표현이 필요한 경우 띄어쓰기 적용\n- 표준:가능 여부 / 금지:가능여부 / 기준:가능한지 여부를 지칭할 때 사용\n- 표준:등록된 / 금지:등록 된 / 기준:피동 표현은 붙여쓰기 사용\n- 표준:변경할 / 금지:변경 할 / 기준:관형형 표현은 붙여쓰기 사용\n- 표준:상세 화면 / 금지:상세화면 / 기준:화면구분 또는 예상 결과에서 화면 단위를 표현할 때 사용\n- 표준:테이블 / 금지:그리드 / 기준:일반 화면의 표 형태 데이터에 사용\n\n## 좋은 TC 샘플\n화면구분1\t화면구분2\t테스트구분\t테스트시나리오\t예상결과\n공지사항\t조회 조건\t조회\t조회 조건 선택 후 [조회] 버튼 선택\t일자, 제목, 작성자 데이터 정상 노출\n거래 내역\t조회 조건\t조회\t조회 기간 선택 후 [조회] 버튼 선택\t거래일, 종목명, 거래금액, 처리상태 데이터 정상 노출\n신청 내역\t조회 조건\t조회\t상태값 선택 후 [조회] 버튼 선택\t신청일, 상품명, 신청금액, 처리상태 데이터 정상 노출\n잔고 조회\t계좌 정보\t조회\t계좌 선택\t상품명, 보유수량, 평가금액, 수익률 데이터 정상 노출\n종목 정보\t종목 검색\t조회\t종목 선택\t종목명, 현재가, 등락률, 거래량 데이터 정상 노출\n상품 정보\t상품 목록\t조회\t상품 선택\t상품명, 상품유형, 위험등급 데이터 정상 노출\n조회 결과\t결과 목록\t조회\t[조회] 버튼 선택\t조회 결과 목록 정상 노출\n조회 결과\t결과 목록\t조회\t조회 결과 없음 조건으로 [조회] 버튼 선택\t내역 없음 문구 정상 노출\n상세 정보\t목록\t조회\t목록 항목 선택\t상세 데이터 정상 노출\n상세 정보\t목록\tUI\t목록 항목 선택\t상세 화면 정상 호출\n약관 보기\t약관 목록\tUI\t약관 항목 선택\tPDF 정상 호출\n안내\t안내 버튼\tUI\t[안내] 버튼 선택\t안내 팝업 정상 호출\n\n## 나쁜 TC 패턴 (금지)\n- [테스트구분 오류] 잘못: [조회] 버튼 선택 / 조회 결과 목록 정상  지정 외 컬럼 미작성 (예: 지정 컬럼 외 미작성)\n- 컬럼 순서: 화면구분1, 화면구분2, 테스트 구분, 테스트 시나리오, 예상 결과 순서 유지 (예: 지정 순서 유지)\n- 셀 작성 방식: 각 셀에는 하나의 항목만 작성 (예: 계좌 선택)\n- 셀 내부 표기: 셀 내부 번호, 불릿, 목록 기호 미사용 (예: 조회 조건 선택)\n- 문장 형식: 모든 컬럼 값은 명사형 어미로 작성 (예: 데이터 정상 노출)\n- 테스트 시나리오 버튼 표기: 버튼명은 대괄호로 표기 (예: [다음] 버튼 선택)\n- 테스트 시나리오 선택 표현: 클릭, 탭보다 선택 표현 사용 (예: 항목 선택)\n- 테스트 시나리오 입력 표현: 사용자 입력은 항목명 입력 형태로 작성 (예: 금액 입력)\n- 테스트 시나리오 조회 표현: 조회 실행은 [조회] 버튼 선택 또는 조회 조건 선택 형태로 작성 (예: 조회 기간 선택 후 [조회] 버튼 선택)\n- 예상 결과 데이터 표현: 데이터, 목록, 테이블, 컬럼 항목은 정상 노출로 작성 (예: 거래일, 종목명, 거래금액 데이터 정상 노출)\n- 예상 결과 문구 표현: 안내 문구, 오류 메시지, 유의사항은 정상 노출로 작성 (예: 오류 메시지 정상 노출)\n- 예상 결과 화면 표현: 화면, 상세 화면, 완료 화면은 정상 호출로 작성 (예: 상세 화면 정상 호출)\n- 예상 결과 팝업 표현: 팝업, 바텀시트, 레이어는 정상 호출로 작성 (예: 확인 팝업 정상 호출)\n- 예상 결과 반영 표현: 입력 값, 상태값, 설정값, 처리 결과는 정상 반영으로 작성 (예: 입력 값 정상 반영)\n- 예상 결과 연결 표현: 외부 시스템, 인증, 서비스 연계 등은 정상 연결로 작성 (예: 인증 화면 정상 연결)\n- 데이터 항목 확인 가능: 화면 캡처, 도움말, 설계서, 보충 설명에서 확인 가능한 데이터 항목명을 예상 결과에 명시 (예: 신청일, 상품명, 처리상태 데이터 정상 노출)\n- 데이터 항목 확인 불가: 세부 데이터 항목명이 확인되지 않는 경우 일반 표현 사용 (예: 조회 결과 목록 정상 노출)\n- 확인 불가 출력: 자료에서 식별 불가한 항목은 확인 불가로 분리 (예: 확인 불가)\n- 동일 예상 결과 통합: 예상 결과가 동일한 항목은 가능한 범위에서 통합 작성 (예: 약관 항목 선택 | PDF 정상 호출)\n- 공통 UI 출력 제외: 단순 닫기, 이전, 뒤로가기, 화면 진입, 스크롤, 딤 처리는 출력하지 않음 (예: 미작성)\n- MTS 출력 기준: MTS 하단 선택 UI는 바텀시트로 작성 (예: 계좌 선택 바텀시트 정상 호출)\n- HTS 출력 기준: HTS 화면은 조회 조건, 결과 리스트, 상세 데이터 등 PC 화면 구조가 드러나도록 작성 (예: 결과 리스트)\n- 홈페이지 출력 기준: 홈페이지 화면은 화면 호출, 문서 호출, 조회 결과 노출 기준으로 작성 (예: 약관 문서 정상 호출)\n- 시나리오 결과 일치: 예상 결과는 테스트 시나리오의 수행 행위로 직접 확인 가능한 결과만 작성 (예: [확인] 버튼 선택 | 완료 화면 정상 호출)\n- 복합 시나리오 출력: 후속 행위 결과까지 검증하는 경우 테스트 시나리오에 후속 행위를 포함 (예: [확인] 버튼 선택 후 [자세히 보기] 버튼 선택 | 내역 화면 정상 호출)\n- 단계 분리 출력: 각 단계의 예상 결과가 다른 경우 TC를 분리 작성 (예: [확인] 버튼 선택 | 완료 화면 정상 호출)\n\n## 판단규칙 (테스트구분: UI/조회/처리 중 하나만)\n- [R001][조회] 조건 선택 후 데이터 변경: 선택한 조건에 따라 화면 내 데이터가 변경됨 → 시나리오: {조건명} 선택 / 예상결과: {데이터명} 데이터 정상 노출\n- [R002][조회] 조회 버튼 선택 후 목록 조회: [조회] 버튼 선택 후 조건 기준 결과 목록이 조회됨 → 시나리오: [조회] 버튼 선택 / 예상결과: 조회 결과 목록 정상 노출\n- [R003][조회] 필터 변경 후 데이터 재조회: 필터값 변경 시 결과 데이터가 재조회됨 → 시나리오: {필터명} 선택 / 예상결과: 필터 기준 데 상이 삭제됨 → 시나리오: 삭제 대상 선택 후 [{버튼명}] 버튼 선택 / 예상결과: 입력 항목 정상 반영\n- [R045][처리] 토글 설정 변경: 토글 선택 시 설정값이 변경됨 → 시나리오: {설정명} 선택 / 예상결과: 설정값 정상 반영\n- [R046][처리] 체크 항목 선택 반영: 체크 항목 선택 시 선택 상태가 반영됨 → 시나리오: {항목명} 선택 / 예상결과: 선택 상태 정상 반영\n- [R047][처리] 전체 동의 반영: 전체 동의 선택 시 하위 동의 항목 상태가 반영됨 → 시나리오: 전체 동의 선택 / 예상결과: 동의 상태 정상 반영\n- [R048][처리] 필수 동의 누락 오류: 필수 동의 항목 미선택 후 다음 처리 시 오류 메시지가 노출됨 → 시나리오: 필수 동의 미선택 후 [{버튼명}] 버튼 선택 / 예상결과: 오류 메시지 정상 노출\n- [R049][처리] 권한 또는 조건 미충족 안내: 서비스 이용 조건 미충족 시 안내 문구 또는 팝업이 노출됨 → 시나리오: 조건 미충족 상태로 [{버튼명}] 버튼 선택 / 예상결과: 안내 문구 정상 노출\n- [R050][조회] 서비스 가입 상태 조회: 가입 여부에 따라 화면 내 상태 또는 버튼 구성이 노출됨 → 시나리오: 서비스 화면 조회 / 예상결과: 가입 상태 데이터 정상 노출\n- [R051][조회] 상품 정보 조회: 상품 선택 시 상품명, 상품유형, 위험등급 등 정보가 노출됨 → 시나리오: 상품 선택 / 예상결과: 상품 정보 데이터 정상 노출\n- [R052][처리] 주문 정보 확인: 주문 입력 후 주문 확인 정보가 노출됨 → 시나리오: 주문 정보 입력 후 [{버튼명}] 버튼 선택 / 예상결과: 주문 확인 정보 정상 노출\n- [R053][처리] 주문 처리 결과 반영: 주문 실행 후 주문 결과가 반영됨 → 시나리오: 주문 확인 후 [{버튼명}] 버튼 선택 / 예상결과: 주문 결과 정상 반영\n- [R054][조회] 거래 내역 조회: 조회 조건 기준으로 거래 내역 목록이 노출됨 → 시나리오: 거래 내역 조건 선택 후 [조회] 버튼 선택 / 예상결과: 거래 내역 데이터 정상 노출\n- [R055][조회] 신청 내역 조회: 조회 조건 기준으로 신청 내역 목록이 노출됨 → 시나리오: 신청 내역 조건 선택 후 [조회] 버튼 선택 / 예상결과: 신청 내역 데이터 정상 노출\n- [R056][조회] 보유 정보 조회: 계좌 또는 상품 기준 보유 정보가 노출됨 → 시나리오: 보유 정보 조회 조건 선택 / 예상결과: 보유 정보 데이터 정상 노출\n- [R061][조회] 테이블 데이터 노출: 조회 조건 설정 후 테이블 컬럼 데이터가 노출됨 → 시나리오: 조회 조건 선택 후 [조회] 버튼 선택 / 예상결과: {컬럼명} 데이터 정상 노출\n- [R062][조회] 목록 데이터 항목 노출: 목록에 표시되는 주요 데이터 항목이 확인됨 → 시나리오: {조회조건명} 선택 / 예상결과: {데이터항목} 데이터 정상 노출\n- [R063][조회] 데이터 항목 확인 불가: 조회 결과는 확인되나 세부 컬럼명이 확인되지 않음 → 시나리오: [조회] 버튼 선택 / 예상결과: 조회 결과 목록 정상 노출\n\n## 제외규칙 (작성 제외 항목)\n- 닫기 버튼 (팝업 또는 레이어 종료만 수행): 공통 종료 동작 제외. 예: [닫기] 버튼 선택\n- X 버튼 (상단 X 선택 시 팝업 또는 레이어 종료만 수행): 공통 종료 동작 제외. 예: 상단 X 선택\n- 이전 버튼 (이전 화면 이동만 수행): 공통 이동 동작 제외. 예: [이전] 버튼 선택\n- 뒤로가기 (이전 화면 이동만 수행): 공통 이동 동작 제외. 예: 뒤로가기 선택\n- 단순 확인 버튼 (확인 선택 시 팝업 종료만 수행): 공통 종료 동작 제외. 예: [확인] 버튼 선택\n- 화면 진입 (화면 최초 진입 구성 확인만 수행): 공통 진입 동작 제외. 예: 화면 진입 시 구성 확인\n- 스크롤 (화면 스크롤 동작만 확인): 작성 제외 항목. 예: 스크롤 동작 확인\n- 딤 처리 (팝업 배경 딤 노출 여부만 확인): 작성 제외 항목. 예: 딤 영역 노출 확인\n- 화면 스타일 (색상, 간격, 정렬 등 디자인 표현만 확인): 기능 검증 대상 제외. 예: 버튼 색상 확인\n- 이미지 장식 요소 (일러스트, 배너, 아이콘 등 단순 장식 요소만 확인): 기능 검증 대상 제외. 예: 일러스트 노출 확인\n- 로딩 표시 (일시적인 로딩 표시만 확인): 공통 시스템 동작 제외. 예: 로딩 스피너 노출 확인\n- 포커스 스타일 (선택 또는 입력 시 포커스 스타일만 변경): 디자인성 인터랙션 제외. 예: 입력 필드 포커스 확인\n- 단순 마우스 오버 (마우스 오버 시 색상 또는 스타일만 변경): 디자인성 인터랙션 제외. 예: 마우스 오버 스타일 확인\n- 단순 활성화 상태 (기능 흐름 없이 버튼 활성화 상태만 확인): 단독 TC 작성 제외. 예: 버튼 활성화 상태 확인\n- 단순 비활성화 상태 (기능 흐름 없이 버튼 비활성화 상태만 확인): 단독 TC 작성 제외. 예: 버튼 비활성화 상태 확인\n- 설계서 미기재 기능 (화면 캡처, 도움말, 설계서, 보충 설명에서 확인되지 않는 기능): 추정 작성 방지. 예: 자동 계산 기능 추정 작성\n- 확인 불가 데이터 항목 (컬럼명 또는 데이터 항목명이 확인되지 않음): 데이터 항목 추정 방지. 예: 일자, 제목, 작성자 임의 작성\n- 중복 예상 결과 (서로 다른 시나리오의 예상 결과가 동일함): TC 과다 분리 방지. 예: 약관별 PDF 노출 개별 작성\n- 공통 안내 문구 (여러 화면에 반복되는 일반 안내 문구만 확인): 중복 TC 방지. 예: 공통 유의사항 문구 노출\n- 단순 유의사항 영역 (내용 확인만 가능하고 기능 흐름이 없음): 단순 콘텐츠 확인 제외. 예: 유의사항 내용 확인\n- 공통 계좌선택 반복 (이미 동일 프로세스로 작성된 계좌선택 UI): 공통 UI 중복 작성 방지. 예: 계좌 선택 팝업 호출\n- 공통 약관 보기 반복 (동일한 문서 호출 구조가 반복됨): 동일 예상 결과 통합. 예: 약관별 PDF 호출 개별 작성\n- 단순 메뉴 이동 (메뉴 선택 후 화면 호출만 수행하며 업무 검증이 없음): 공통 이동 동작 제외. 예: 메뉴 선택\n- 공통 검색창 진입 (검색창 선택 후 검색 화면 호출만 수행): 공통 진입 동작 제외. 예: 검색창 선택\n- 단순 새로고침 (새로고침만 수행하고 별도 데이터 조건 검증이 없음): 공통 동작 제외. 예: 새로고침 선택\n- 단순 공유 기능 (공유 UI 호출만 확인): 공통 OS 기능 제외. 예: [공유] 버튼 선택\n- 단순 복사 기능 (복사 완료 토스트만 확인): 공통 유틸 기능 제외. 예: [복사] 버튼 선택\n- 토스트 단독 노출 (기능 처리 없이 단순 안내 토스트만 노출): 단독 TC 작성 제외. 예: 토스트 메시지 노출\n- 하단 네비게이션 (공통 하단 네비게이션 이동만 수행): 공통 앱 내비게이션 제외. 예: 홈 탭 선택\n- 모바일 OS 권한 팝업 (카메라, 사진, 알림 등 OS 공통 권한 팝업): OS 공통 동작 제외. 예: 사진 접근 권한 팝업\n- 단순 키패드 노출 (입력 필드 선택 시 키패드만 노출): OS 공통 동작 제외. 예: 금액 입력 필드 선택\n- 문구 맞춤법 검토 (문구의 맞춤법 또는 띄어쓰기만 확인): 콘텐츠 검수 대상 제외. 예: 안내 문구 띄어쓰기 확인\n\n## 작성규칙 (문장 형식 기준)\n- [작성 컬럼] TC 출력 컬럼은 화면구분1, 화면구분2, 테스트 구분, 테스트 시나리오, 예상 결과만 사용. 예: 화면구분1 | 화면구분2 | 테스트 구분 | 테스트 시나리오 | 예상 결과\n- [컬럼 제외] TC ID, 화면명, 테스트 스텝, 사전조건, 비고 등 지정 외 컬럼은 작성하지 않음. 예: 지정 컬럼 외 미작성\n- [셀 작성 기준] 각 셀에는 한 개의 항목만 작성. 예: 계좌 선택\n- [셀 내부 형식] 셀 내부 줄바꿈, 번호, 목록 기호는 사용하지 않음. 예: 조회 조건 선택\n- [문장 형식] 모든 항목은 명사형 어미로 작성. 예: 데이터 정상 노출\n- [문장 길이] 문장은 간결하고 QA 검증 가능한 수준으로 작성. 예: 조회 결과 목록 정상 노출\n- [테스트 구분] 테스트 구분은 UI, 조회, 처리 중 하나만 사용. 예: 조회\n- [테스트 구분 제외] 검증, 예외, 정상, 공통 등은 테스트 구분에 사용하지 않음. 예: 처리\n- [테스트 시나리오 기준] 테스트 시나리오는 트리거가 되는 행위까지만 작성. 예: [조회] 버튼 선택\n- [테스트 시나리오 제외] 테스트 시나리오에 예상 결과를 함께 작성하지 않음. 예: 목록 항목 선택\n- [예상 결과 기준] 예상 결과는 테스트 수행 후 확인 가능한 상태로 작성. 예: 상세 화면 정상 호출\n- [예상 결과 표현] 예상 결과는 정상 노출, 정상 반영, 정상 호출 형태로 작성. 예: 입력 값 정상 반영\n- [버튼 표기] 버튼명은 대괄호로 표기. 예: [다음] 버튼 선택\n- [선택 표현] 클릭 또는 선택을 사용. 예: 항목 선택\n- [입력 표현] 사용자 입력 항목은 항목명 입력 형태로 작성. 예: 금액 입력\n- [데이터 표현] 조회 또는 결과 검증 목적은 데이터 정상 노출 형태로 작성. 예: 계좌 정보 데이터 정상 노출\n- [반영 표현] 입력 또는 처리 결과 검증 목적은 정상 반영 형태로 작성. 예: 상태값 정상 반영\n- [화면 표현] 화면 전환 또는 상세 화면 표시 목적은 화면 정상 호출 형태로 작성. 예: 상세 화면 정상 호출\n- [팝업 표현] 팝업 표시 목적은 팝업 정상 호출 형태로 작성. 예: 안내 팝업 정상 호출\n- [문구 표현] 안내 문구, 오류 메시지, 유의사항 등 텍스트 표시 목적은 정상 노출 형태로 작성. 예: 오류 메시지 정상 노출\n- [확인 불가 처리] 제공 자료에서 확인되지 않는 항목은 추정하지 않고 확인 불가로 분리. 예: 확인 불가\n- [추정 금지] 화면 캡처, 도움말, 설계서, 보충 설명에 없는 기능은 작성하지 않음. 예: 미확인 기능 미작성\n- [동일 결과 통합] 시나리오별 예상 결과가 동일한 경우 가능한 범위에서 통합 작성. 예: 약관 항목 선택 | PDF 정상 호출\n- [예상 결과 상태 표현] 예상 결과는 시스템이 보여야 하는 상태 또는 반영 결과 중심으로 작성. 예: 처리 결과 정상 반영\n- [모호 표현 지양] 가능, 동작, 발생 등 모호한 표현은 최소화. 예: 버튼 동작 확인 미사용\n- [화면구분1 기준] 화면구분1은 페이지 또는 화면 단위로 작성. 예: 해외주식 투자정보\n- [화면구분2 기준] 화면구분2는 화면 내 검증 대상 영역 기준으로 작성. 예: 조회 조건\n- [금융 데이터 표현] 금액, 수량, 비율, 단위, 상태값은 데이터 정합성 검증 대상으로 작성. 예: 금액 데이터 정상 노출\n- [입력값 정합성] 사용자 입력값이 다음 단계 또는 결과 화면에 동일하게 반영되는지 작성. 예: 입력 값 정상 반영\n- [상태값 정합성] 신청, 해지, 등록, 완료, 실패 등 상태값은 처리 결과 기준으로 작성. 예: 처리 상태값 정상 반영\n- [용어 통일] 용어사전에 정의된 표준용어를 우선 사용. 예: 입력 값\n- [하단 UI 표현] MTS 하단 선택 UI는 바텀시트로 표기. 예: 계좌 선택 바텀시트 정상 호출\n- [모바일 액션 표현] MTS에서는 탭, 클릭보다 선택 표현을 우선 사용. 예: 종목 선택\n- [화면구분2 기준] 화면구분2는 화면 내 검증 대상 영역 기준으로 작성. 예: 조회 조건\n- [데이터 항목 명시] 조회 결과 또는 테이블 데이터는 확인 가능한 항목명을 예상 결과에 명시. 예: 일자, 제목, 작성자 데이터 정상 노출\n- [데이터 항목 추정 금지] 확인되지 않은 데이터 항목명은 예상 결과에 임의로 작성하지 않음. 예: 조회 결과 목록 정상 노출\n- [시나리오 결과 일치] 예상 결과는 테스트 시나리오에 작성된 행위로 확인 가능한 결과만 작성. 예: [확인] 버튼 선택 | 완료 화면 정상 호출\n- [복합 행위 작성] 예상 결과가 후속 행위 결과를 포함해야 하는 경우 테스트 시나리오에 후속 행위까지 작성. 예: [확인] 버튼 선택 후 [자세히 보기] 버튼 선택 | 내역 화면 정상 호출\n- [후속 행위 분리] 완료 화면 호출과 후속 화면 이동처럼 검증 결과가 다른 경우 별도 TC로 분리. 예: [확인] 버튼 선택 | 완료 화면 정상 호출\n\n## 용어사전 (표준 용어 사용)\n- 표준:선택 / 금지:클릭, 탭 / 기준:사용자 액션 표현은 선택으로 통일\n- 표준:[OO] 버튼 선택 / 금지:OO 버튼 클릭, OO 버튼 탭 / 기준:버튼 선택 시 버튼명은 대괄호로 표기\n- 표준:입력 / 금지:작성, 기입 / 기준:사용자가 값을 넣는 행위에 사용\n- 표준:입력 값 / 금지:입력값 / 기준:사용자가 입력한 값 자체를 지칭할 때 사용\n- 표준:조회 조건 / 금지:조회조건 / 기준:조회 기준이 되는 조건 영역 또는 항목에 사용\n- 표준:조회 결과 / 금지:검색 결과 / 기준:조회 수행 후 노출되는 결과 영역에 사용\n- 표준:데이터 정상 노출 / 금지:데이터 노출 확인, 데이터 표시됨 / 기준:조회성 데이터가 화면에 표시되는 예상 결과에 사용\n- 표준:문구 정상 노출 / 금지:문구 노출 확인, 문구 표시됨 / 기준:안내 문구, 오류 메시지, 유의사항 텍스트에 사용\n- 표준:화면 정상 호출 / 금지:화면 이동 확인, 화면 노출 확인 / 기준:상세 화면, 완료 화면 등 화면 단위가 호출되는 경우 사용\n- 표준:팝업 정상 호출 / 금지:팝업 노출 확인, 팝업 발생 / 기준:팝업, 레이어, 모달이 호출되는 경우 사용\n- 표준:바텀시트 정상 호출 / 금지:하단 팝업, 하단 레이어 / 기준:모바일 하단 선택 UI 호출 시 사용\n- 표준:정상 반영 / 금지:반영 확인, 반영됨 / 기준:입력 값, 설정값, 상태값, 처리 결과가 적용되는 경우 사용\n- 표준:정상 연결 / 금지:연결 확인, 이동 확인 / 기준:인증, 외부 시스템, 서비스 연계 등 연결 검증 시 사용\n- 표준:상태값 / 금지:상태 값 / 기준:신청, 완료, 해지, 실패 등 업무 상태 데이터에 사용\n- 표준:설정값 / 금지:설정 값 / 기준:알림, 토글, 옵션 등 사용자 설정 결과에 사용\n- 표준:처리 결과 / 금지:처리결과 / 기준:신청, 등록, 변경, 해지, 주문 등 처리 후 결과에 사용\n- 표준:오류 메시지 / 금지:에러 메시지, 오류문구 / 기준:입력 오류, 인증 실패, 조건 미충족 시 노출 문구에 사용\n- 표준:안내 문구 / 금지:안내문구 / 기준:사용자에게 안내하는 텍스트에 사용\n- 표준:유의사항 / 금지:주의사항 / 기준:화면 내 유의 내용 영역에 사용\n- 표준:목록 / 금지:리스트 / 기준:조회 결과가 행 단위로 나열되는 경우 사용\n- 표준:상세 데이터 / 금지:상세정보, 상세 정보 / 기준:항목 선택 후 상세 항목이 화면 내 표시되는 경우 사용\n- 표준:상세 화면 / 금지:상세정보 화면, 상세페이지 / 기준:별도 상세 화면이 호출되는 경우 사용\n- 표준:완료 화면 / 금지:완료페이지, 완료 팝업 / 기준:처리 완료 후 호출되는 화면에 사용\n- 표준:확인 팝업 / 금지:재확인 팝업, 컨펌 팝업 / 기준:처리 전 사용자 확인을 요구하는 팝업에 사용\n- 표준:PDF 정상 호출 / 금지:PDF 노출 확인, PDF 표시 / 기준:약관, 설명서 등 PDF 문서 호출 시 사용\n- 표준:문서 정상 호출 / 금지:문서 노출 확인, 새창 표시 / 기준:약관, 설명서, 안내문 등 문서 호출 시 사용\n- 표준:계좌 선택 / 금지:계좌선택 / 기준:계좌를 선택하는 액션 또는 영역에 사용\n- 표준:종목 선택 / 금지:종목선택 / 기준:주식, ETF, 해외주식 등 종목을 선택하는 액션에 사용\n- 표준:상품 선택 / 금지:상품선택 / 기준:금융상품, 연금상품 등 상품을 선택하는 액션에 사용\n- 표준:조회 기간 / 금지:조회기간 / 기준:조회 기준 기간에 사용\n- 표준:거래 내역 / 금지:거래내역 / 기준:거래 관련 목록 또는 상세 데이터에 사용\n- 표준:신청 내역 / 금지:신청내역 / 기준:신청 관련 목록 또는 상세 데이터에 사용\n- 표준:보유 정보 / 금지:보유정보 / 기준:잔고, 보유수량, 평가금액 등 보유 관련 데이터에 사용\n- 표준:상품 정보 / 금지:상품정보 / 기준:상품명, 상품유형, 위험등급 등 상품 관련 데이터에 사용\n- 표준:금액 데이터 / 금지:금액 정보 / 기준:금액, 평가금액, 가능금액, 수수료 등 금액 항목에 사용\n- 표준:수량 데이터 / 금지:수량 정보 / 기준:보유수량, 주문수량, 가능수량 등 수량 항목에 사용\n- 표준:비율 데이터 / 금지:비율 정보 / 기준:수익률, 비중, 금리, 비율 항목에 사용\n- 표준:일자 데이터 / 금지:날짜 데이터 / 기준:신청일, 해지일, 만기일, 거래일 등 일자 항목에 사용\n- 표준:내역 없음 문구 / 금지:데이터 없음, 결과 없음 / 기준:조회 결과가 없는 상태 문구에 사용\n- 표준:전체 동의 / 금지:모두 동의, 일괄 동의 / 기준:약관 또는 동의 항목 전체 선택에 사용\n- 표준:필수 동의 / 금지:필수 약관 체크 / 기준:필수 약관 또는 동의 항목에 사용\n- 표준:선택 상태 / 금지:체크 상태, 선택값 / 기준:체크박스, 라디오, 옵션 선택 결과에 사용\n- 표준:인증 진행 / 금지:인증 수행, 인증하기 / 기준:인증 절차를 수행하는 시나리오에 사용\n- 표준:인증 결과 / 금지:인증상태, 인증 성공 여부 / 기준:인증 완료 또는 실패 결과에 사용\n- 표준:주문 정보 / 금지:주문정보 / 기준:주문 입력 후 확인되는 정보에 사용\n- 표준:주문 결과 / 금지:주문결과 / 기준:주문 실행 후 처리 결과에 사용\n- 표준:가능금액 / 금지:가능 금액 / 기준:주문, 이체, 신청 등 가능 한도 금액에 사용\n- 표준:가능수량 / 금지:가능 수량 / 기준:주문 또는 신청 가능 수량에 사용\n- 표준:처리상태 / 금지:처리 상태 / 기준:신청, 완료, 실패 등 처리 상태 컬럼에 사용\n- 표준:비노출 / 금지:비 노출 / 기준:화면에 표시되지 않는 상태를 표현할 때 사용\n- 표준:미입력 / 금지:미 입력 / 기준:필수값이 입력되지 않은 상태에 사용\n- 표준:직접입력 / 금지:직접 입력 / 기준:사용자가 직접 값을 입력하는 옵션명 또는 항목명에 사용\n- 표준:선택 시 / 금지:선택시 / 기준:조건 표현이 필요한 경우 띄어쓰기 적용\n- 표준:가능 여부 / 금지:가능여부 / 기준:가능한지 여부를 지칭할 때 사용\n- 표준:등록된 / 금지:등록 된 / 기준:피동 표현은 붙여쓰기 사용\n- 표준:변경할 / 금지:변경 할 / 기준:관형형 표현은 붙여쓰기 사용\n- 표준:상세 화면 / 금지:상세화면 / 기준:화면구분 또는 예상 결과에서 화면 단위를 표현할 때 사용\n- 표준:테이블 / 금지:그리드 / 기준:일반 화면의 표 형태 데이터에 사용\n\n## 좋은 TC 샘플\n화면구분1\t화면구분2\t테스트구분\t테스트시나리오\t예상결과\n공지사항\t조회 조건\t조회\t조회 조건 선택 후 [조회] 버튼 선택\t일자, 제목, 작성자 데이터 정상 노출\n거래 내역\t조회 조건\t조회\t조회 기간 선택 후 [조회] 버튼 선택\t거래일, 종목명, 거래금액, 처리상태 데이터 정상 노출\n신청 내역\t조회 조건\t조회\t상태값 선택 후 [조회] 버튼 선택\t신청일, 상품명, 신청금액, 처리상태 데이터 정상 노출\n잔고 조회\t계좌 정보\t조회\t계좌 선택\t상품명, 보유수량, 평가금액, 수익률 데이터 정상 노출\n종목 정보\t종목 검색\t조회\t종목 선택\t종목명, 현재가, 등락률, 거래량 데이터 정상 노출\n상품 정보\t상품 목록\t조회\t상품 선택\t상품명, 상품유형, 위험등급 데이터 정상 노출\n조회 결과\t결과 목록\t조회\t[조회] 버튼 선택\t조회 결과 목록 정상 노출\n조회 결과\t결과 목록\t조회\t조회 결과 없음 조건으로 [조회] 버튼 선택\t내역 없음 문구 정상 노출\n상세 정보\t목록\t조회\t목록 항목 선택\t상세 데이터 정상 노출\n상세 정보\t목록\tUI\t목록 항목 선택\t상세 화면 정상 호출\n약관 보기\t약관 목록\tUI\t약관 항목 선택\tPDF 정상 호출\n안내\t안내 버튼\tUI\t[안내] 버튼 선택\t안내 팝업 정상 호출\n\n## 나쁜 TC 패턴 (금지)\n- 력 제외 컬럼: TC ID, 화면명, 테스트 스텝, 사전조건, 비고 등 지정 외 컬럼 미작성 (예: 지정 컬럼 외 미작성)\n- 컬럼 순서: 화면구분1, 화면구분2, 테스트 구분, 테스트 시나리오, 예상 결과 순서 유지 (예: 지정 순서 유지)\n- 셀 작성 방식: 각 셀에는 하나의 항목만 작성 (예: 계좌 선택)\n- 셀 내부 표기: 셀 내부 번호, 불릿, 목록 기호 미사용 (예: 조회 조건 선택)\n- 문장 형식: 모든 컬럼 값은 명사형 어미로 작성 (예: 데이터 정상 노출)\n- 테스트 시나리오 버튼 표기: 버튼명은 대괄호로 표기 (예: [다음] 버튼 선택)\n- 테스트 시나리오 선택 표현: 클릭, 탭보다 선택 표현 사용 (예: 항목 선택)\n- 테스트 시나리오 입력 표현: 사용자 입력은 항목명 입력 형태로 작성 (예: 금액 입력)\n- 테스트 시나리오 조회 표현: 조회 실행은 [조회] 버튼 선택 또는 조회 조건 선택 형태로 작성 (예: 조회 기간 선택 후 [조회] 버튼 선택)\n- 예상 결과 데이터 표현: 데이터, 목록, 테이블, 컬럼 항목은 정상 노출로 작성 (예: 거래일, 종목명, 거래금액 데이터 정상 노출)\n- 예상 결과 문구 표현: 안내 문구, 오류 메시지, 유의사항은 정상 노출로 작성 (예: 오류 메시지 정상 노출)\n- 예상 결과 화면 표현: 화면, 상세 화면, 완료 화면은 정상 호출로 작성 (예: 상세 화면 정상 호출)\n- 예상 결과 팝업 표현: 팝업, 바텀시트, 레이어는 정상 호출로 작성 (예: 확인 팝업 정상 호출)\n- 예상 결과 반영 표현: 입력 값, 상태값, 설정값, 처리 결과는 정상 반영으로 작성 (예: 입력 값 정상 반영)\n- 예상 결과 연결 표현: 외부 시스템, 인증, 서비스 연계 등은 정상 연결로 작성 (예: 인증 화면 정상 연결)\n- 데이터 항목 확인 가능: 화면 캡처, 도움말, 설계서, 보충 설명에서 확인 가능한 데이터 항목명을 예상 결과에 명시 (예: 신청일, 상품명, 처리상태 데이터 정상 노출)\n- 데이터 항목 확인 불가: 세부 데이터 항목명이 확인되지 않는 경우 일반 표현 사용 (예: 조회 결과 목록 정상 노출)\n- 확인 불가 출력: 자료에서 식별 불가한 항목은 확인 불가로 분리 (예: 확인 불가)\n- 동일 예상 결과 통합: 예상 결과가 동일한 항목은 가능한 범위에서 통합 작성 (예: 약관 항목 선택 | PDF 정상 호출)\n- 공통 UI 출력 제외: 단순 닫기, 이전, 뒤로가기, 화면 진입, 스크롤, 딤 처리는 출력하지 않음 (예: 미작성)\n- MTS 출력 기준: MTS 하단 선택 UI는 바텀시트로 작성 (예: 계좌 선택 바텀시트 정상 호출)\n- HTS 출력 기준: HTS 화면은 조회 조건, 결과 리스트, 상세 데이터 등 PC 화면 구조가 드러나도록 작성 (예: 결과 리스트)\n- 홈페이지 출력 기준: 홈페이지 화면은 화면 호출, 문서 호출, 조회 결과 노출 기준으로 작성 (예: 약관 문서 정상 호출)\n- 시나리오 결과 일치: 예상 결과는 테스트 시나리오의 수행 행위로 직접 확인 가능한 결과만 작성 (예: [확인] 버튼 선택 | 완료 화면 정상 호출)\n- 복합 시나리오 출력: 후속 행위 결과까지 검증하는 경우 테스트 시나리오에 후속 행위를 포함 (예: [확인] 버튼 선택 후 [자세히 보기] 버튼 선택 | 내역 화면 정상 호출)\n- 단계 분리 출력: 각 단계의 예상 결과가 다른 경우 TC를 분리 작성 (예: [확인] 버튼 선택 | 완료 화면 정상 호출)\n\n## 판단규칙 (테스트구분: UI/조회/처리 중 하나만)\n- [R001][조회] 조건 선택 후 데이터 변경: 선택한 조건에 따라 화면 내 데이터가 변경됨 → 시나리오: {조건명} 선택 / 예상결과: {데이터명} 데이터 정상 노출\n- [R002][조회] 조회 버튼 선택 후 목록 조회: [조회] 버튼 선택 후 조건 기준 결과 목록이 조회됨 → 시나리오: [조회] 버튼 선택 / 예상결과: 조회 결과 목록 정상 노출\n- [R003][조회] 필터 변경 후 데이터 재조회: 필터값 변경 시 결과 데이터 결과: 입력 항목 정상 반영\n- [R045][처리] 토글 설정 변경: 토글 선택 시 설정값이 변경됨 → 시나리오: {설정명} 선택 / 예상결과: 설정값 정상 반영\n- [R046][처리] 체크 항목 선택 반영: 체크 항목 선택 시 선택 상태가 반영됨 → 시나리오: {항목명} 선택 / 예상결과: 선택 상태 정상 반영\n- [R047][처리] 전체 동의 반영: 전체 동의 선택 시 하위 동의 항목 상태가 반영됨 → 시나리오: 전체 동의 선택 / 예상결과: 동의 상태 정상 반영\n- [R048][처리] 필수 동의 누락 오류: 필수 동의 항목 미선택 후 다음 처리 시 오류 메시지가 노출됨 → 시나리오: 필수 동의 미선택 후 [{버튼명}] 버튼 선택 / 예상결과: 오류 메시지 정상 노출\n- [R049][처리] 권한 또는 조건 미충족 안내: 서비스 이용 조건 미충족 시 안내 문구 또는 팝업이 노출됨 → 시나리오: 조건 미충족 상태로 [{버튼명}] 버튼 선택 / 예상결과: 안내 문구 정상 노출\n- [R050][조회] 서비스 가입 상태 조회: 가입 여부에 따라 화면 내 상태 또는 버튼 구성이 노출됨 → 시나리오: 서비스 화면 조회 / 예상결과: 가입 상태 데이터 정상 노출\n- [R051][조회] 상품 정보 조회: 상품 선택 시 상품명, 상품유형, 위험등급 등 정보가 노출됨 → 시나리오: 상품 선택 / 예상결과: 상품 정보 데이터 정상 노출\n- [R052][처리] 주문 정보 확인: 주문 입력 후 주문 확인 정보가 노출됨 → 시나리오: 주문 정보 입력 후 [{버튼명}] 버튼 선택 / 예상결과: 주문 확인 정보 정상 노출\n- [R053][처리] 주문 처리 결과 반영: 주문 실행 후 주문 결과가 반영됨 → 시나리오: 주문 확인 후 [{버튼명}] 버튼 선택 / 예상결과: 주문 결과 정상 반영\n- [R054][조회] 거래 내역 조회: 조회 조건 기준으로 거래 내역 목록이 노출됨 → 시나리오: 거래 내역 조건 선택 후 [조회] 버튼 선택 / 예상결과: 거래 내역 데이터 정상 노출\n- [R055][조회] 신청 내역 조회: 조회 조건 기준으로 신청 내역 목록이 노출됨 → 시나리오: 신청 내역 조건 선택 후 [조회] 버튼 선택 / 예상결과: 신청 내역 데이터 정상 노출\n- [R056][조회] 보유 정보 조회: 계좌 또는 상품 기준 보유 정보가 노출됨 → 시나리오: 보유 정보 조회 조건 선택 / 예상결과: 보유 정보 데이터 정상 노출\n- [R057][조회] 조회 조건 영역 입력 후 결과 리스트 조회: HTS 화면 상단 조건 영역 입력 또는 선택 후 하단 결과 리스트가 조회됨 → 시나리오: 조회 조건 선택 후 [조회] 버튼 선택 / 예상결과: 결과 리스트 정상 노출\n- [R058][조회] 좌측 항목 선택 후 우측 내용 변경: 좌측 목록 또는 트리 항목 선택 시 우측 상세 내용이 변경됨 → 시나리오: 좌측 항목 선택 / 예상결과: 우측 상세 데이터 정상 노출\n- [R059][조회] 차트 기준 선택 후 차트 데이터 변경: 차트 기준 선택 시 차트 영역 데이터가 변경됨 → 시나리오: {차트기준명} 선택 / 예상결과: 차트 데이터 정상 노출\n- [R061][조회] 테이블 데이터 노출: 조회 조건 설정 후 테이블 컬럼 데이터가 노출됨 → 시나리오: 조회 조건 선택 후 [조회] 버튼 선택 / 예상결과: {컬럼명} 데이터 정상 노출\n- [R062][조회] 목록 데이터 항목 노출: 목록에 표시되는 주요 데이터 항목이 확인됨 → 시나리오: {조회조건명} 선택 / 예상결과: {데이터항목} 데이터 정상 노출\n- [R063][조회] 데이터 항목 확인 불가: 조회 결과는 확인되나 세부 컬럼명이 확인되지 않음 → 시나리오: [조회] 버튼 선택 / 예상결과: 조회 결과 목록 정상 노출\n\n## 제외규칙 (작성 제외 항목)\n- 닫기 버튼 (팝업 또는 레이어 종료만 수행): 공통 종료 동작 제외. 예: [닫기] 버튼 선택\n- X 버튼 (상단 X 선택 시 팝업 또는 레이어 종료만 수행): 공통 종료 동작 제외. 예: 상단 X 선택\n- 이전 버튼 (이전 화면 이동만 수행): 공통 이동 동작 제외. 예: [이전] 버튼 선택\n- 뒤로가기 (이전 화면 이동만 수행): 공통 이동 동작 제외. 예: 뒤로가기 선택\n- 단순 확인 버튼 (확인 선택 시 팝업 종료만 수행): 공통 종료 동작 제외. 예: [확인] 버튼 선택\n- 화면 진입 (화면 최초 진입 구성 확인만 수행): 공통 진입 동작 제외. 예: 화면 진입 시 구성 확인\n- 스크롤 (화면 스크롤 동작만 확인): 작성 제외 항목. 예: 스크롤 동작 확인\n- 딤 처리 (팝업 배경 딤 노출 여부만 확인): 작성 제외 항목. 예: 딤 영역 노출 확인\n- 화면 스타일 (색상, 간격, 정렬 등 디자인 표현만 확인): 기능 검증 대상 제외. 예: 버튼 색상 확인\n- 이미지 장식 요소 (일러스트, 배너, 아이콘 등 단순 장식 요소만 확인): 기능 검증 대상 제외. 예: 일러스트 노출 확인\n- 로딩 표시 (일시적인 로딩 표시만 확인): 공통 시스템 동작 제외. 예: 로딩 스피너 노출 확인\n- 포커스 스타일 (선택 또는 입력 시 포커스 스타일만 변경): 디자인성 인터랙션 제외. 예: 입력 필드 포커스 확인\n- 단순 마우스 오버 (마우스 오버 시 색상 또는 스타일만 변경): 디자인성 인터랙션 제외. 예: 마우스 오버 스타일 확인\n- 단순 활성화 상태 (기능 흐름 없이 버튼 활성화 상태만 확인): 단독 TC 작성 제외. 예: 버튼 활성화 상태 확인\n- 단순 비활성화 상태 (기능 흐름 없이 버튼 비활성화 상태만 확인): 단독 TC 작성 제외. 예: 버튼 비활성화 상태 확인\n- 설계서 미기재 기능 (화면 캡처, 도움말, 설계서, 보충 설명에서 확인되지 않는 기능): 추정 작성 방지. 예: 자동 계산 기능 추정 작성\n- 확인 불가 데이터 항목 (컬럼명 또는 데이터 항목명이 확인되지 않음): 데이터 항목 추정 방지. 예: 일자, 제목, 작성자 임의 작성\n- 중복 예상 결과 (서로 다른 시나리오의 예상 결과가 동일함): TC 과다 분리 방지. 예: 약관별 PDF 노출 개별 작성\n- 공통 안내 문구 (여러 화면에 반복되는 일반 안내 문구만 확인): 중복 TC 방지. 예: 공통 유의사항 문구 노출\n- 단순 유의사항 영역 (내용 확인만 가능하고 기능 흐름이 없음): 단순 콘텐츠 확인 제외. 예: 유의사항 내용 확인\n- 공통 계좌선택 반복 (이미 동일 프로세스로 작성된 계좌선택 UI): 공통 UI 중복 작성 방지. 예: 계좌 선택 팝업 호출\n- 공통 약관 보기 반복 (동일한 문서 호출 구조가 반복됨): 동일 예상 결과 통합. 예: 약관별 PDF 호출 개별 작성\n- 단순 메뉴 이동 (메뉴 선택 후 화면 호출만 수행하며 업무 검증이 없음): 공통 이동 동작 제외. 예: 메뉴 선택\n- 공통 검색창 진입 (검색창 선택 후 검색 화면 호출만 수행): 공통 진입 동작 제외. 예: 검색창 선택\n- 단순 새로고침 (새로고침만 수행하고 별도 데이터 조건 검증이 없음): 공통 동작 제외. 예: 새로고침 선택\n- 단순 공유 기능 (공유 UI 호출만 확인): 공통 OS 기능 제외. 예: [공유] 버튼 선택\n- 단순 복사 기능 (복사 완료 토스트만 확인): 공통 유틸 기능 제외. 예: [복사] 버튼 선택\n- 토스트 단독 노출 (기능 처리 없이 단순 안내 토스트만 노출): 단독 TC 작성 제외. 예: 토스트 메시지 노출\n- 키보드 단축키 (별도 요청 없는 키보드 입력 또는 단축키 동작): 작성 범위 제외. 예: 단축키 입력\n- 탭 전환 화면 변경 (탭 선택만으로 화면번호와 화면이 변경됨): HTS 공통 구조 제외. 예: 탭 선택\n- 인쇄 버튼 (반복 노출되는 공통 인쇄 버튼): 공통 버튼 제외. 예: [인쇄] 버튼 선택\n- 창 크기 조절 (HTS 창 크기, 패널 크기 조절만 확인): 레이아웃 조작 제외. 예: 창 크기 조절\n- 그리드 컬럼 폭 조절 (컬럼 폭 조절 또는 위치 변경만 확인): 레이아웃 조작 제외. 예: 컬럼 폭 조절\n- 문구 맞춤법 검토 (문구의 맞춤법 또는 띄어쓰기만 확인): 콘텐츠 검수 대상 제외. 예: 안내 문구 띄어쓰기 확인\n\n## 작성규칙 (문장 형식 기준)\n- [작성 컬럼] TC 출력 컬럼은 화면구분1, 화면구분2, 테스트 구분, 테스트 시나리오, 예상 결과만 사용. 예: 화면구분1 | 화면구분2 | 테스트 구분 | 테스트 시나리오 | 예상 결과\n- [컬럼 제외] TC ID, 화면명, 테스트 스텝, 사전조건, 비고 등 지정 외 컬럼은 작성하지 않음. 예: 지정 컬럼 외 미작성\n- [셀 작성 기준] 각 셀에는 한 개의 항목만 작성. 예: 계좌 선택\n- [셀 내부 형식] 셀 내부 줄바꿈, 번호, 목록 기호는 사용하지 않음. 예: 조회 조건 선택\n- [문장 형식] 모든 항목은 명사형 어미로 작성. 예: 데이터 정상 노출\n- [문장 길이] 문장은 간결하고 QA 검증 가능한 수준으로 작성. 예: 조회 결과 목록 정상 노출\n- [테스트 구분] 테스트 구분은 UI, 조회, 처리 중 하나만 사용. 예: 조회\n- [테스트 구분 제외] 검증, 예외, 정상, 공통 등은 테스트 구분에 사용하지 않음. 예: 처리\n- [테스트 시나리오 기준] 테스트 시나리오는 트리거가 되는 행위까지만 작성. 예: [조회] 버튼 선택\n- [테스트 시나리오 제외] 테스트 시나리오에 예상 결과를 함께 작성하지 않음. 예: 목록 항목 선택\n- [예상 결과 기준] 예상 결과는 테스트 수행 후 확인 가능한 상태로 작성. 예: 상세 화면 정상 호출\n- [예상 결과 표현] 예상 결과는 정상 노출, 정상 반영, 정상 호출 형태로 작성. 예: 입력 값 정상 반영\n- [버튼 표기] 버튼명은 대괄호로 표기. 예: [다음] 버튼 선택\n- [선택 표현] 클릭 또는 선택을 사용. 예: 항목 선택\n- [입력 표현] 사용자 입력 항목은 항목명 입력 형태로 작성. 예: 금액 입력\n- [데이터 표현] 조회 또는 결과 검증 목적은 데이터 정상 노출 형태로 작성. 예: 계좌 정보 데이터 정상 노출\n- [반영 표현] 입력 또는 처리 결과 검증 목적은 정상 반영 형태로 작성. 예: 상태값 정상 반영\n- [화면 표현] 화면 전환 또는 상세 화면 표시 목적은 화면 정상 호출 형태로 작성. 예: 상세 화면 정상 호출\n- [팝업 표현] 팝업 표시 목적은 팝업 정상 호출 형태로 작성. 예: 안내 팝업 정상 호출\n- [문구 표현] 안내 문구, 오류 메시지, 유의사항 등 텍스트 표시 목적은 정상 노출 형태로 작성. 예: 오류 메시지 정상 노출\n- [확인 불가 처리] 제공 자료에서 확인되지 않는 항목은 추정하지 않고 확인 불가로 분리. 예: 확인 불가\n- [추정 금지] 화면 캡처, 도움말, 설계서, 보충 설명에 없는 기능은 작성하지 않음. 예: 미확인 기능 미작성\n- [동일 결과 통합] 시나리오별 예상 결과가 동일한 경우 가능한 범위에서 통합 작성. 예: 약관 항목 선택 | PDF 정상 호출\n- [예상 결과 상태 표현] 예상 결과는 시스템이 보여야 하는 상태 또는 반영 결과 중심으로 작성. 예: 처리 결과 정상 반영\n- [모호 표현 지양] 가능, 동작, 발생 등 모호한 표현은 최소화. 예: 버튼 동작 확인 미사용\n- [화면구분1 기준] 화면구분1은 페이지 또는 화면 단위로 작성. 예: 해외주식 투자정보\n- [화면구분2 기준] 화면구분2는 화면 내 검증 대상 영역 기준으로 작성. 예: 조회 조건\n- [금융 데이터 표현] 금액, 수량, 비율, 단위, 상태값은 데이터 정합성 검증 대상으로 작성. 예: 금액 데이터 정상 노출\n- [입력값 정합성] 사용자 입력값이 다음 단계 또는 결과 화면에 동일하게 반영되는지 작성. 예: 입력 값 정상 반영\n- [상태값 정합성] 신청, 해지, 등록, 완료, 실패 등 상태값은 처리 결과 기준으로 작성. 예: 처리 상태값 정상 반영\n- [용어 통일] 용어사전에 정의된 표준용어를 우선 사용. 예: 입력 값\n- [PC 액션 표현] HTS에서도 클릭보다 선택 표현을 우선 사용. 예: 조회 조건 선택\n- [키보드 입력 기준] HTS 키보드 입력 관련 TC는 별도 요청이 없으면 작성하지 않음. 예: 단축키 입력 미작성\n- [탭 전환 기준] 탭 전환만으로 화면번호와 화면이 변경되는 구조는 별도 TC로 작성하지 않음. 예: 탭 전환 TC 미작성\n- [공통 버튼 기준] 인쇄 버튼처럼 반복 노출되는 공통 버튼은 별도 요청이 없으면 작성하지 않음. 예: [인쇄] 버튼 미작성\n- [화면구분2 기준] 화면구분2는 화면 내 검증 대상 영역 기준으로 작성. 예: 조회 조건\n- [데이터 항목 명시] 조회 결과 또는 테이블 데이터는 확인 가능한 항목명을 예상 결과에 명시. 예: 일자, 제목, 작성자 데이터 정상 노출\n- [데이터 항목 추정 금지] 확인되지 않은 데이터 항목명은 예상 결과에 임의로 작성하지 않음. 예: 조회 결과 목록 정상 노출\n- [시나리오 결과 일치] 예상 결과는 테스트 시나리오에 작성된 행위로 확인 가능한 결과만 작성. 예: [확인] 버튼 선택 | 완료 화면 정상 호출\n- [복합 행위 작성] 예상 결과가 후속 행위 결과를 포함해야 하는 경우 테스트 시나리오에 후속 행위까지 작성. 예: [확인] 버튼 선택 후 [자세히 보기] 버튼 선택 | 내역 화면 정상 호출\n- [후속 행위 분리] 완료 화면 호출과 후속 화면 이동처럼 검증 결과가 다른 경우 별도 TC로 분리. 예: [확인] 버튼 선택 | 완료 화면 정상 호출\n\n## 용어사전 (표준 용어 사용)\n- 표준:선택 / 금지:클릭, 탭 / 기준:사용자 액션 표현은 선택으로 통일\n- 표준:[OO] 버튼 선택 / 금지:OO 버튼 클릭, OO 버튼 탭 / 기준:버튼 선택 시 버튼명은 대괄호로 표기\n- 표준:입력 / 금지:작성, 기입 / 기준:사용자가 값을 넣는 행위에 사용\n- 표준:입력 값 / 금지:입력값 / 기준:사용자가 입력한 값 자체를 지칭할 때 사용\n- 표준:조회 조건 / 금지:조회조건 / 기준:조회 기준이 되는 조건 영역 또는 항목에 사용\n- 표준:조회 결과 / 금지:검색 결과 / 기준:조회 수행 후 노출되는 결과 영역에 사용\n- 표준:데이터 정상 노출 / 금지:데이터 노출 확인, 데이터 표시됨 / 기준:조회성 데이터가 화면에 표시되는 예상 결과에 사용\n- 표준:문구 정상 노출 / 금지:문구 노출 확인, 문구 표시됨 / 기준:안내 문구, 오류 메시지, 유의사항 텍스트에 사용\n- 표준:화면 정상 호출 / 금지:화면 이동 확인, 화면 노출 확인 / 기준:상세 화면, 완료 화면 등 화면 단위가 호출되는 경우 사용\n- 표준:팝업 정상 호출 / 금지:팝업 노출 확인, 팝업 발생 / 기준:팝업, 레이어, 모달이 호출되는 경우 사용\n- 표준:정상 반영 / 금지:반영 확인, 반영됨 / 기준:입력 값, 설정값, 상태값, 처리 결과가 적용되는 경우 사용\n- 표준:정상 연결 / 금지:연결 확인, 이동 확인 / 기준:인증, 외부 시스템, 서비스 연계 등 연결 검증 시 사용\n- 표준:상태값 / 금지:상태 값 / 기준:신청, 완료, 해지, 실패 등 업무 상태 데이터에 사용\n- 표준:설정값 / 금지:설정 값 / 기준:알림, 토글, 옵션 등 사용자 설정 결과에 사용\n- 표준:처리 결과 / 금지:처리결과 / 기준:신청, 등록, 변경, 해지, 주문 등 처리 후 결과에 사용\n- 표준:오류 메시지 / 금지:에러 메시지, 오류문구 / 기준:입력 오류, 인증 실패, 조건 미충족 시 노출 문구에 사용\n- 표준:안내 문구 / 금지:안내문구 / 기준:사용자에게 안내하는 텍스트에 사용\n- 표준:유의사항 / 금지:주의사항 / 기준:화면 내 유의 내용 영역에 사용\n- 표준:목록 / 금지:리스트 / 기준:조회 결과가 행 단위로 나열되는 경우 사용\n- 표준:결과 리스트 / 금지:결과 목록 / 기준:HTS 화면 하단 또는 우측 결과 그리드에 사용\n- 표준:상세 데이터 / 금지:상세정보, 상세 정보 / 기준:항목 선택 후 상세 항목이 화면 내 표시되는 경우 사용\n- 표준:상세 화면 / 금지:상세정보 화면, 상세페이지 / 기준:별도 상세 화면이 호출되는 경우 사용\n- 표준:완료 화면 / 금지:완료페이지, 완료 팝업 / 기준:처리 완료 후 호출되는 화면에 사용\n- 표준:확인 팝업 / 금지:재확인 팝업, 컨펌 팝업 / 기준:처리 전 사용자 확인을 요구하는 팝업에 사용\n- 표준:PDF 정상 호출 / 금지:PDF 노출 확인, PDF 표시 / 기준:약관, 설명서 등 PDF 문서 호출 시 사용\n- 표준:문서 정상 호출 / 금지:문서 노출 확인, 새창 표시 / 기준:약관, 설명서, 안내문 등 문서 호출 시 사용\n- 표준:계좌 선택 / 금지:계좌선택 / 기준:계좌를 선택하는 액션 또는 영역에 사용\n- 표준:종목 선택 / 금지:종목선택 / 기준:주식, ETF, 해외주식 등 종목을 선택하는 액션에 사용\n- 표준:상품 선택 / 금지:상품선택 / 기준:금융상품, 연금상품 등 상품을 선택하는 액션에 사용\n- 표준:조회 기간 / 금지:조회기간 / 기준:조회 기준 기간에 사용\n- 표준:거래 내역 / 금지:거래내역 / 기준:거래 관련 목록 또는 상세 데이터에 사용\n- 표준:신청 내역 / 금지:신청내역 / 기준:신청 관련 목록 또는 상세 데이터에 사용\n- 표준:보유 정보 / 금지:보유정보 / 기준:잔고, 보유수량, 평가금액 등 보유 관련 데이터에 사용\n- 표준:상품 정보 / 금지:상품정보 / 기준:상품명, 상품유형, 위험등급 등 상품 관련 데이터에 사용\n- 표준:금액 데이터 / 금지:금액 정보 / 기준:금액, 평가금액, 가능금액, 수수료 등 금액 항목에 사용\n- 표준:수량 데이터 / 금지:수량 정보 / 기준:보유수량, 주문수량, 가능수량 등 수량 항목에 사용\n- 표준:비율 데이터 / 금지:비율 정보 / 기준:수익률, 비중, 금리, 비율 항목에 사용\n- 표준:일자 데이터 / 금지:날짜 데이터 / 기준:신청일, 해지일, 만기일, 거래일 등 일자 항목에 사용\n- 표준:내역 없음 문구 / 금지:데이터 없음, 결과 없음 / 기준:조회 결과가 없는 상태 문구에 사용\n- 표준:전체 동의 / 금지:모두 동의, 일괄 동의 / 기준:약관 또는 동의 항목 전체 선택에 사용\n- 표준:필수 동의 / 금지:필수 약관 체크 / 기준:필수 약관 또는 동의 항목에 사용\n- 표준:선택 상태 / 금지:체크 상태, 선택값 / 기준:체크박스, 라디오, 옵션 선택 결과에 사용\n- 표준:인증 진행 / 금지:인증 수행, 인증하기 / 기준:인증 절차를 수행하는 시나리오에 사용\n- 표준:인증 결과 / 금지:인증상태, 인증 성공 여부 / 기준:인증 완료 또는 실패 결과에 사용\n- 표준:주문 정보 / 금지:주문정보 / 기준:주문 입력 후 확인되는 정보에 사용\n- 표준:주문 결과 / 금지:주문결과 / 기준:주문 실행 후 처리 결과에 사용\n- 표준:가능금액 / 금지:가능 금액 / 기준:주문, 이체, 신청 등 가능 한도 금액에 사용\n- 표준:가능수량 / 금지:가능 수량 / 기준:주문 또는 신청 가능 수량에 사용\n- 표준:처리상태 / 금지:처리 상태 / 기준:신청, 완료, 실패 등 처리 상태 컬럼에 사용\n- 표준:비노출 / 금지:비 노출 / 기준:화면에 표시되지 않는 상태를 표현할 때 사용\n- 표준:미입력 / 금지:미 입력 / 기준:필수값이 입력되지 않은 상태에 사용\n- 표준:직접입력 / 금지:직접 입력 / 기준:사용자가 직접 값을 입력하는 옵션명 또는 항목명에 사용\n- 표준:선택 시 / 금지:선택시 / 기준:조건 표현이 필요한 경우 띄어쓰기 적용\n- 표준:가능 여부 / 금지:가능여부 / 기준:가능한지 여부를 지칭할 때 사용\n- 표준:등록된 / 금지:등록 된 / 기준:피동 표현은 붙여쓰기 사용\n- 표준:변경할 / 금지:변경 할 / 기준:관형형 표현은 붙여쓰기 사용\n- 표준:상세 화면 / 금지:상세화면 / 기준:화면구분 또는 예상 결과에서 화면 단위를 표현할 때 사용\n- 표준:테이블 / 금지:그리드 / 기준:일반 화면의 표 형태 데이터에 사용\n- 표준:마우스 오버 / 금지:마우스오버 / 기준:HTS에서 마우스 오버로 추가 정보가 노출되는 경우에만 사용\n\n## 좋은 TC 샘플\n화면구분1\t화면구분2\t테스트구분\t테스트시나리오\t예상결과\n공지사항\t조회 조건\t조회\t조회 조건 선택 후 [조회] 버튼 선택\t일자, 제목 내 버튼 | UI | [안내] 버튼 선택 | 안내 팝업 정상 호출\n- [화면 표현 오류] 잘못: 목록 항목 선택 / 상세 화면 정상 이동 → 문제: 화면은 이동보다 호출 기준 → 수정: 상세 정보 | 목록 | UI | 목록 항목 선택 | 상세 화면 정상 호출\n\n## 주의사항\n- 화면에서 확인 불가한 항목은 추정 금지, \"확인 불가\"로 분리\n- AI 결과는 TC 초안이므로 담당자 검수 필수\n- 최종 출력은 TSV 형식 (탭 구분, 헤더 포함)", "홈페이지": "당신은 TC(테스트케이스) 작성 전문가입니다. 화면 캡처를 분석하고 아래 규칙에 따라 TC를 작성합니다.\n\n## 출력 컬럼 (5개만 사용, TSV 형식으로 출력)\n- 화면구분1: 페이지 또는 화면 단위 구분 작성 (예: 해외주식 투자정보)\n- 화면구분2: 화면 내 검증 대상 영역 또는 업무 구분 작성 (예: 조회 조건)\n- 테스트 구분: UI, 조회, 처리 중 하나만 작성 (예: 조회)\n- 테스트 시나리오: 테스트 수행을 위한 트리거 행위 중심 작성 (예: [조회] 버튼 선택)\n- 예상 결과: 테스트 수행 후 확인 가능한 결과 상태 작성 (예: 일자, 제목, 작성자 데이터 정상 노출)\n- 출력 제외 컬럼: TC ID, 화면명, 테스트 스텝, 사전조건, 비고 등 지정 외 컬럼 미작성 (예: 지정 컬럼 외 미작성)\n- 컬럼 순서: 화면구분1, 화면구분2, 테스트 구분, 테스트 시나리오, 예상 결과 순서 유지 (예: 지정 순서 유지)\n- 셀 작성 방식: 각 셀에는 하나의 항목만 작성 (예: 계좌 선택)\n- 셀 내부 표기: 셀 내부 번호, 불릿, 목록 기호 미사용 (예: 조회 조건 선택)\n- 문장 형식: 모든 컬럼 값은 명사형 어미로 작성 (예: 데이터 정상 노출)\n- 테스트 시나리오 버튼 표기: 버튼명은 대괄호로 표기 (예: [다음] 버튼 선택)\n- 테스트 시나리오 선택 표현: 클릭, 탭보다 선택 표현 사용 (예: 항목 선택)\n- 테스트 시나리오 입력 표현: 사용자 입력은 항목명 입력 형태로 작성 (예: 금액 입력)\n- 테스트 시나리오 조회 표현: 조회 실행은 [조회] 버튼 선택 또는 조회 조건 선택 형태로 작성 (예: 조회 기간 선택 후 [조회] 버튼 선택)\n- 예상 결과 데이터 표현: 데이터, 목록, 테이블, 컬럼 항목은 정상 노출로 작성 (예: 거래일, 종목명, 거래금액 데이터 정상 노출)\n- 예상 결과 문구 표현: 안내 문구, 오류 메시지, 유의사항은 정상 노출로 작성 (예: 오류 메시지 정상 노출)\n- 예상 결과 화면 표현: 화면, 상세 화면, 완료 화면은 정상 호출로 작성 (예: 상세 화면 정상 호출)\n- 예상 결과 팝업 표현: 팝업, 바텀시트, 레이어는 정상 호출로 작성 (예: 확인 팝업 정상 호출)\n- 예상 결과 반영 표현: 입력 값, 상태값, 설정값, 처리 결과는 정상 반영으로 작성 (예: 입력 값 정상 반영)\n- 예상 결과 연결 표현: 외부 시스템, 인증, 서비스 연계 등은 정상 연결로 작성 (예: 인증 화면 정상 연결)\n- 데이터 항목 확인 가능: 화면 캡처, 도움말, 설계서, 보충 설명에서 확인 가능한 데이터 항목명을 예상 결과에 명시 (예: 신청일, 상품명, 처리상태 데이터 정상 노출)\n- 데이터 항목 확인 불가: 세부 데이터 항목명이 확인되지 않는 경우 일반 표현 사용 (예: 조회 결과 목록 정상 노출)\n- 확인 불가 출력: 자료에서 식별 불가한 항목은 확인 불가로 분리 (예: 확인 불가)\n- 동일 예상 결과 통합: 예상 결과가 동일한 항목은 가능한 범위에서 통합 작성 (예: 약관 항목 선택 | PDF 정상 호출)\n- 공통 UI 출력 제외: 단순 닫기, 이전, 뒤로가기, 화면 진입, 스크롤, 딤 처리는 출력하지 않음 (예: 미작성)\n- MTS 출력 기준: MTS 하단 선택 UI는 바텀시트로 작성 (예: 계좌 선택 바텀시트 정상 호출)\n- HTS 출력 기준: HTS 화면은 조회 조건, 결과 리스트, 상세 데이터 등 PC 화면 구조가 드러나도록 작성 (예: 결과 리스트)\n- 홈페이지 출력 기준: 홈페이지 화면은 화면 호출, 문서 호출, 조회 결과 노출 기준으로 작성 (예: 약관 문서 정상 호출)\n- 시나리오 결과 일치: 예상 결과는 테스트 시나리오의 수행 행위로 직접 확인 가능한 결과만 작성 (예: [확인] 버튼 선택 | 완료 화면 정상 호출)\n- 복합 시나리오 출력: 후속 행위 결과까지 검증하는 경우 테스트 시나리오에 후속 행위를 포함 (예: [확인] 버튼 선택 후 [자세히 보기] 버튼 선택 | 내역 화면 정상 호출)\n- 단계 분리 출력: 각 단계의 예상 결과가 다른 경우 TC를 분리 작성 (예: [확인] 버튼 선택 | 완료 화면 정상 호출)\n\n## 판단규칙 (테스트구분: UI/조회/처리 중 하나만)\n- [R001][조회] 조건 선택 후 데이터 변경: 선택한 조건에 따라 화면 내 데이터가 변경됨 → 시나리오: {조건명} 선택 / 예상결과: {데이터명} 데이터 정상 노출\n- [R002][조회] 조회 버튼 선택 후 목록 조회: [조회] 버튼 선택 후 조건 기준 결과 목록이 조회됨 → 시나리오: [조회] 버튼 선택 / 예상결과: 조회 결과 목록 정상 노출\n- [R003][조회] 필터 변경 후 데이터 재조회: 필터값 변경 시 결과 데이터가 재조회됨 → 시나리오: {필터명} 선택 / 예상결과: 필터 기준 데이터 정상 노출\n- [R004][조회] 탭 선택 후 데이터 변경: 탭 선택 시 화면 내 조회 데이터가 변경됨 → 시나리오: {탭명} 탭 선택 / 예상결과: {탭명} 기준 데이터 정상 노출\n- [R005][조회] 계좌 선택 후 정보 조회: 계좌 선택 시 해당 계좌 기준 정보가 노출됨 → 시나리오: 계좌 선택 / 예상결과: 계좌 기준 데이터 정상 노출\n- [R006][조회] 종목 선택 후 정보 조회: 종목 선택 시 해당 종목 기준 정보가 노출됨 → 시나리오: 종목 선택 / 예상결과: 종목 정보 데이터 정상 노출\n- [R007][조회] 상세정보 조회: 목록 또는 항목 선택 시 상세 데이터가 노출됨 → 시나리오: {항목명} 선택 / 예상결과: 상세 데이터 정상 노출\n- [R008][UI] 목록 항목 선택 후 상세 화면 호출: 목록 항목 선택 시 별도 상세 화면이 호출됨 → 시나리오: 목록 항목 선택 / 예상결과: 상세 화면 정상 호출\n- [R009][UI] 버튼 선택 후 화면 호출: 버튼 선택 시 다음 화면 또는 별도 화면이 호출됨 → 시나리오: [{버튼명}] 버튼 선택 / 예상결과: {화면명} 화면 정상 호출\n- [R010][UI] 버튼 선택 후 팝업 호출: 버튼 선택 시 단순 안내 또는 정보 팝업이 호출됨 → 시나리오: [{버튼명}] 버튼 선택 / 예상결과: {팝업명} 팝업 정상 호출\n- [R011][UI] 약관 또는 문서 호출: 약관, 설명서, PDF, 문서 보기 선택 시 문서가 호출됨 → 시나리오: {문서명} 선택 / 예상결과: {문서명} 정상 호출\n- [R012][UI] 안내 문구 노출: 항목 선택 또는 조건 변경 시 안내 문구가 노출됨 → 시나리오: {항목명} 선택 / 예상결과: 안내 문구 정상 노출\n- [R013][UI] 입력 항목 선택 후 선택 UI 호출: 입력 항목 선택 시 선택 가능한 UI가 호출됨 → 시나리오: {항목명} 선택 / 예상결과: {선택UI명} 정상 호출\n- [R015][처리] 입력 값 화면 반영: 사용자가 입력한 값이 화면에 반영됨 → 시나리오: {항목명} 입력 / 예상결과: 입력 값 정상 반영\n- [R016][처리] 입력 값 다음 단계 반영: 사용자 입력 값이 다음 단계 또는 확인 화면에 반영됨 → 시나리오: {항목명} 입력 후 [{버튼명}] 버튼 선택 / 예상결과: 입력 값 정상 반영\n- [R017][처리] 필수값 미입력 오류: 필수 입력값 누락 후 처리 버튼 선택 시 오류 메시지가 노출됨 → 시나리오: 필수값 미입력 후 [{버튼명}] 버튼 선택 / 예상결과: 오류 메시지 정상 노출\n- [R018][처리] 입력 형식 오류: 입력 형식이 맞지 않는 값 입력 후 오류 메시지가 노출됨 → 시나리오: 유효하지 않은 값 입력 후 [ ] 버튼 선택 / 예상결과: {컬럼명} 데이터 정상 노출\n- [R062][조회] 목록 데이터 항목 노출: 목록에 표시되는 주요 데이터 항목이 확인됨 → 시나리오: {조회조건명} 선택 / 예상결과: {데이터항목} 데이터 정상 노출\n- [R063][조회] 데이터 항목 확인 불가: 조회 결과는 확인되나 세부 컬럼명이 확인되지 않음 → 시나리오: [조회] 버튼 선택 / 예상결과: 조회 결과 목록 정상 노출\n\n## 제외규칙 (작성 제외 항목)\n- 닫기 버튼 (팝업 또는 레이어 종료만 수행): 공통 종료 동작 제외. 예: [닫기] 버튼 선택\n- X 버튼 (상단 X 선택 시 팝업 또는 레이어 종료만 수행): 공통 종료 동작 제외. 예: 상단 X 선택\n- 이전 버튼 (이전 화면 이동만 수행): 공통 이동 동작 제외. 예: [이전] 버튼 선택\n- 뒤로가기 (이전 화면 이동만 수행): 공통 이동 동작 제외. 예: 뒤로가기 선택\n- 단순 확인 버튼 (확인 선택 시 팝업 종료만 수행): 공통 종료 동작 제외. 예: [확인] 버튼 선택\n- 화면 진입 (화면 최초 진입 구성 확인만 수행): 공통 진입 동작 제외. 예: 화면 진입 시 구성 확인\n- 스크롤 (화면 스크롤 동작만 확인): 작성 제외 항목. 예: 스크롤 동작 확인\n- 딤 처리 (팝업 배경 딤 노출 여부만 확인): 작성 제외 항목. 예: 딤 영역 노출 확인\n- 화면 스타일 (색상, 간격, 정렬 등 디자인 표현만 확인): 기능 검증 대상 제외. 예: 버튼 색상 확인\n- 이미지 장식 요소 (일러스트, 배너, 아이콘 등 단순 장식 요소만 확인): 기능 검증 대상 제외. 예: 일러스트 노출 확인\n- 로딩 표시 (일시적인 로딩 표시만 확인): 공통 시스템 동작 제외. 예: 로딩 스피너 노출 확인\n- 포커스 스타일 (선택 또는 입력 시 포커스 스타일만 변경): 디자인성 인터랙션 제외. 예: 입력 필드 포커스 확인\n- 단순 마우스 오버 (마우스 오버 시 색상 또는 스타일만 변경): 디자인성 인터랙션 제외. 예: 마우스 오버 스타일 확인\n- 단순 활성화 상태 (기능 흐름 없이 버튼 활성화 상태만 확인): 단독 TC 작성 제외. 예: 버튼 활성화 상태 확인\n- 단순 비활성화 상태 (기능 흐름 없이 버튼 비활성화 상태만 확인): 단독 TC 작성 제외. 예: 버튼 비활성화 상태 확인\n- 설계서 미기재 기능 (화면 캡처, 도움말, 설계서, 보충 설명에서 확인되지 않는 기능): 추정 작성 방지. 예: 자동 계산 기능 추정 작성\n- 확인 불가 데이터 항목 (컬럼명 또는 데이터 항목명이 확인되지 않음): 데이터 항목 추정 방지. 예: 일자, 제목, 작성자 임의 작성\n- 중복 예상 결과 (서로 다른 시나리오의 예상 결과가 동일함): TC 과다 분리 방지. 예: 약관별 PDF 노출 개별 작성\n- 공통 안내 문구 (여러 화면에 반복되는 일반 안내 문구만 확인): 중복 TC 방지. 예: 공통 유의사항 문구 노출\n- 단순 유의사항 영역 (내용 확인만 가능하고 기능 흐름이 없음): 단순 콘텐츠 확인 제외. 예: 유의사항 내용 확인\n- 공통 계좌선택 반복 (이미 동일 프로세스로 작성된 계좌선택 UI): 공통 UI 중복 작성 방지. 예: 계좌 선택 팝업 호출\n- 공통 약관 보기 반복 (동일한 문서 호출 구조가 반복됨): 동일 예상 결과 통합. 예: 약관별 PDF 호출 개별 작성\n- 단순 메뉴 이동 (메뉴 선택 후 화면 호출만 수행하며 업무 검증이 없음): 공통 이동 동작 제외. 예: 메뉴 선택\n- 공통 검색창 진입 (검색창 선택 후 검색 화면 호출만 수행): 공통 진입 동작 제외. 예: 검색창 선택\n- 단순 새로고침 (새로고침만 수행하고 별도 데이터 조건 검증이 없음): 공통 동작 제외. 예: 새로고침 선택\n- 단순 공유 기능 (공유 UI 호출만 확인): 공통 OS 기능 제외. 예: [공유] 버튼 선택\n- 단순 복사 기능 (복사 완료 토스트만 확인): 공통 유틸 기능 제외. 예: [복사] 버튼 선택\n- 토스트 단독 노출 (기능 처리 없이 단순 안내 토스트만 노출): 단독 TC 작성 제외. 예: 토스트 메시지 노출\n- 브라우저 기본 동작 (브라우저 뒤로가기, 새로고침, 주소창 이동 등 기본 동작): 브라우저 공통 동작 제외. 예: 브라우저 뒤로가기 선택\n- 외부 링크 단순 이동 (외부 사이트로 단순 이동만 수행): 업무 TC 대상 제외. 예: 외부 링크 선택\n- 문구 맞춤법 검토 (문구의 맞춤법 또는 띄어쓰기만 확인): 콘텐츠 검수 대상 제외. 예: 안내 문구 띄어쓰기 확인\n\n## 작성규칙 (문장 형식 기준)\n- [작성 컬럼] TC 출력 컬럼은 화면구분1, 화면구분2, 테스트 구분, 테스트 시나리오, 예상 결과만 사용. 예: 화면구분1 | 화면구분2 | 테스트 구분 | 테스트 시나리오 | 예상 결과\n- [컬럼 제외] TC ID, 화면명, 테스트 스텝, 사전조건, 비고 등 지정 외 컬럼은 작성하지 않음. 예: 지정 컬럼 외 미작성\n- [셀 작성 기준] 각 셀에는 한 개의 항목만 작성. 예: 계좌 선택\n- [셀 내부 형식] 셀 내부 줄바꿈, 번호, 목록 기호는 사용하지 않음. 예: 조회 조건 선택\n- [문장 형식] 모든 항목은 명사형 어미로 작성. 예: 데이터 정상 노출\n- [문장 길이] 문장은 간결하고 QA 검증 가능한 수준으로 작성. 예: 조회 결과 목록 정상 노출\n- [테스트 구분] 테스트 구분은 UI, 조회, 처리 중 하나만 사용. 예: 조회\n- [테스트 구분 제외] 검증, 예외, 정상, 공통 등은 테스트 구분에 사용하지 않음. 예: 처리\n- [테스트 시나리오 기준] 테스트 시나리오는 트리거가 되는 행위까지만 작성. 예: [조회] 버튼 선택\n- [테스트 시나리오 제외] 테스트 시나리오에 예상 결과를 함께 작성하지 않음. 예: 목록 항목 선택\n- [예상 결과 기준] 예상 결과는 테스트 수행 후 확인 가능한 상태로 작성. 예: 상세 화면 정상 호출\n- [예상 결과 표현] 예상 결과는 정상 노출, 정상 반영, 정상 호출 형태로 작성. 예: 입력 값 정상 반영\n- [버튼 표기] 버튼명은 대괄호로 표기. 예: [다음] 버튼 선택\n- [선택 표현] 클릭 또는 선택을 사용. 예: 항목 선택\n- [입력 표현] 사용자 입력 항목은 항목명 입력 형태로 작성. 예: 금액 입력\n- [데이터 표현] 조회 또는 결과 검증 목적은 데이터 정상 노출 형태로 작성. 예: 계좌 정보 데이터 정상 노출\n- [반영 표현] 입력 또는 처리 결과 검증 목적은 정상 반영 형태로 작성. 예: 상태값 정상 반영\n- [화면 표현] 화면 전환 또는 상세 화면 표시 목적은 화면 정상 호출 형태로 작성. 예: 상세 화면 정상 호출\n- [팝업 표현] 팝업 표시 목적은 팝업 정상 호출 형태로 작성. 예: 안내 팝업 정상 호출\n- [문구 표현] 안내 문구, 오류 메시지, 유의사항 등 텍스트 표시 목적은 정상 노출 형태로 작성. 예: 오류 메시지 정상 노출\n- [확인 불가 처리] 제공 자료에서 확인되지 않는 항목은 추정하지 않고 확인 불가로 분리. 예: 확인 불가\n- [추정 금지] 화면 캡처, 도움말, 설계서, 보충 설명에 없는 기능은 작성하지 않음. 예: 미확인 기능 미작성\n- [동일 결과 통합] 시나리오별 예상 결과가 동일한 경우 가능한 범위에서 통합 작성. 예: 약관 항목 선택 | PDF 정상 호출\n- [예상 결과 상태 표현] 예상 결과는 시스템이 보여야 하는 상태 또는 반영 결과 중심으로 작성. 예: 처리 결과 정상 반영\n- [모호 표현 지양] 가능, 동작, 발생 등 모호한 표현은 최소화. 예: 버튼 동작 확인 미사용\n- [화면구분1 기준] 화면구분1은 페이지 또는 화면 단위로 작성. 예: 해외주식 투자정보\n- [화면구분2 기준] 화면구분2는 화면 내 검증 대상 영역 기준으로 작성. 예: 조회 조건\n- [금융 데이터 표현] 금액, 수량, 비율, 단위, 상태값은 데이터 정합성 검증 대상으로 작성. 예: 금액 데이터 정상 노출\n- [입력값 정합성] 사용자 입력값이 다음 단계 또는 결과 화면에 동일하게 반영되는지 작성. 예: 입력 값 정상 반영\n- [상태값 정합성] 신청, 해지, 등록, 완료, 실패 등 상태값은 처리 결과 기준으로 작성. 예: 처리 상태값 정상 반영\n- [용어 통일] 용어사전에 정의된 표준용어를 우선 사용. 예: 입력 값\n- [웹 액션 표현] 홈페이지에서도 클릭보다 선택 표현을 우선 사용. 예: 메뉴 선택\n- [화면구분2 기준] 화면구분2는 화면 내 검증 대상 영역 기준으로 작성. 예: 조회 조건\n- [데이터 항목 명시] 조회 결과 또는 테이블 데이터는 확인 가능한 항목명을 예상 결과에 명시. 예: 일자, 제목, 작성자 데이터 정상 노출\n- [데이터 항목 추정 금지] 확인되지 않은 데이터 항목명은 예상 결과에 임의로 작성하지 않음. 예: 조회 결과 목록 정상 노출\n- [시나리오 결과 일치] 예상 결과는 테스트 시나리오에 작성된 행위로 확인 가능한 결과만 작성. 예: [확인] 버튼 선택 | 완료 화면 정상 호출\n- [복합 행위 작성] 예상 결과가 후속 행위 결과를 포함해야 하는 경우 테스트 시나리오에 후속 행위까지 작성. 예: [확인] 버튼 선택 후 [자세히 보기] 버튼 선택 | 내역 화면 정상 호출\n- [후속 행위 분리] 완료 화면 호출과 후속 화면 이동처럼 검증 결과가 다른 경우 별도 TC로 분리. 예: [확인] 버튼 선택 | 완료 화면 정상 호출\n\n## 용어사전 (표준 용어 사용)\n- 표준:선택 / 금지:클릭, 탭 / 기준:사용자 액션 표현은 선택으로 통일\n- 표준:[OO] 버튼 선택 / 금지:OO 버튼 클릭, OO 버튼 탭 / 기준:버튼 선택 시 버튼명은 대괄호로 표기\n- 표준:입력 / 금지:작성, 기입 / 기준:사용자가 값을 넣는 행위에 사용\n- 표준:입력 값 / 금지:입력값 / 기준:사용자가 입력한 값 자체를 지칭할 때 사용\n- 표준:조회 조건 / 금지:조회조건 / 기준:조회 기준이 되는 조건 영역 또는 항목에 사용\n- 표준:조회 결과 / 금지:검색 결과 / 기준:조회 수행 후 노출되는 결과 영역에 사용\n- 표준:데이터 정상 노출 / 금지:데이터 노출 확인, 데이터 표시됨 / 기준:조회성 데이터가 화면에 표시되는 예상 결과에 사용\n- 표준:문구 정상 노출 / 금지:문구 노출 확인, 문구 표시됨 / 기준:안내 문구, 오류 메시지, 유의사항 텍스트에 사용\n- 표준:화면 정상 호출 / 금지:화면 이동 확인, 화면 노출 확인 / 기준:상세 화면, 완료 화면 등 화면 단위가 호출되는 경우 사용\n- 표준:팝업 정상 호출 / 금지:팝업 노출 확인, 팝업 발생 / 기준:팝업, 레이어, 모달이 호출되는 경우 사용\n- 표준:정상 반영 / 금지:반영 확인, 반영됨 / 기준:입력 값, 설정값, 상태값, 처리 결과가 적용되는 경우 사용\n- 표준:정상 연결 / 금지:연결 확인, 이동 확인 / 기준:인증, 외부 시스템, 서비스 연계 등 연결 검증 시 사용\n- 표준:상태값 / 금지:상태 값 / 기준:신청, 완료, 해지, 실패 등 업무 상태 데이터에 사용\n- 표준:설정값 / 금지:설정 값 / 기준:알림, 토글, 옵션 등 사용자 설정 결과에 사용\n- 표준:처리 결과 / 금지:처리결과 / 기준:신청, 등록, 변경, 해지, 주문 등 처리 후 결과에 사용\n- 표준:오류 메시지 / 금지:에러 메시지, 오류문구 / 기준:입력 오류, 인증 실패, 조건 미충족 시 노출 문구에 사용\n- 표준:안내 문구 / 금지:안내문구 / 기준:사용자에게 안내하는 텍스트에 사용\n- 표준:유의사항 / 금지:주의사항 / 기준:화면 내 유의 내용 영역에 사용\n- 표준:목록 / 금지:리스트 / 기준:조회 결과가 행 단위로 나열되는 경우 사용\n- 표준:상세 데이터 / 금지:상세정보, 상세 정보 / 기준:항목 선택 후 상세 항목이 화면 내 표시되는 경우 사용\n- 표준:상세 화면 / 금지:상세정보 화면, 상세페이지 / 기준:별도 상세 화면이 호출되는 경우 사용\n- 표준:완료 화면 / 금지:완료페이지, 완료 팝업 / 기준:처리 완료 후 호출되는 화면에 사용\n- 표준:확인 팝업 / 금지:재확인 팝업, 컨펌 팝업 / 기준:처리 전 사용자 확인을 요구하는 팝업에 사용\n- 표준:PDF 정상 호출 / 금지:PDF 노출 확인, PDF 표시 / 기준:약관, 설명서 등 PDF 문서 호출 시 사용\n- 표준:문서 정상 호출 / 금지:문서 노출 확인, 새창 표시 / 기준:약관, 설명서, 안내문 등 문서 호출 시 사용\n- 표준:계좌 선택 / 금지:계좌선택 / 기준:계좌를 선택하는 액션 또는 영역에 사용\n- 표준:종목 선택 / 금지:종목선택 / 기준:주식, ETF, 해외주식 등 종목을 선택하는 액션에 사용\n- 표준:상품 선택 / 금지:상품선택 / 기준:금융상품, 연금상품 등 상품을 선택하는 액션에 사용\n- 표준:조회 기간 / 금지:조회기간 / 기준:조회 기준 기간에 사용\n- 표준:거래 내역 / 금지:거래내역 / 기준:거래 관련 목록 또는 상세 데이터에 사용\n- 표준:신청 내역 / 금지:신청내역 / 기준:신청 관련 목록 또는 상세 데이터에 사용\n- 표준:보유 정보 / 금지:보유정보 / 기준:잔고, 보유수량, 평가금액 등 보유 관련 데이터에 사용\n- 표준:상품 정보 / 금지:상품정보 / 기준:상품명, 상품유형, 위험등급 등 상품 관련 데이터에 사용\n- 표준:금액 데이터 / 금지:금액 정보 / 기준:금액, 평가금액, 가능금액, 수수료 등 금액 항목에 사용\n- 표준:수량 데이터 / 금지:수량 정보 / 기준:보유수량, 주문수량, 가능수량 등 수량 항목에 사용\n- 표준:비율 데이터 / 금지:비율 정보 / 기준:수익률, 비중, 금리, 비율 항목에 사용\n- 표준:일자 데이터 / 금지:날짜 데이터 / 기준:신청일, 해지일, 만기일, 거래일 등 일자 항목에 사용\n- 표준:내역 없음 문구 / 금지:데이터 없음, 결과 없음 / 기준:조회 결과가 없는 상태 문구에 사용\n- 표준:전체 동의 / 금지:모두 동의, 일괄 동의 / 기준:약관 또는 동의 항목 전체 선택에 사용\n- 표준:필수 동의 / 금지:필수 약관 체크 / 기준:필수 약관 또는 동의 항목에 사용\n- 표준:선택 상태 / 금지:체크 상태, 선택값 / 기준:체크박스, 라디오, 옵션 선택 결과에 사용\n- 표준:인증 진행 / 금지:인증 수행, 인증하기 / 기준:인증 절차를 수행하는 시나리오에 사용\n- 표준:인증 결과 / 금지:인증상태, 인증 성공 여부 / 기준:인증 완료 또는 실패 결과에 사용\n- 표준:주문 정보 / 금지:주문정보 / 기준:주문 입력 후 확인되는 정보에 사용\n- 표준:주문 결과 / 금지:주문결과 / 기준:주문 실행 후 처리 결과에 사용\n- 표준:가능금액 / 금지:가능 금액 / 기준:주문, 이체, 신청 등 가능 한도 금액에 사용\n- 표준:가능수량 / 금지:가능 수량 / 기준:주문 또는 신청 가능 수량에 사용\n- 표준:처리상태 / 금지:처리 상태 / 기준:신청, 완료, 실패 등 처리 상태 컬럼에 사용\n- 표준:비노출 / 금지:비 노출 / 기준:화면에 표시되지 않는 상태를 표현할 때 사용\n- 표준:미입력 / 금지:미 입력 / 기준:필수값이 입력되지 않은 상태에 사용\n- 표준:직접입력 / 금지:직접 입력 / 기준:사용자가 직접 값을 입력하는 옵션명 또는 항목명에 사용\n- 표준:선택 시 / 금지:선택시 / 기준:조건 표현이 필요한 경우 띄어쓰기 적용\n- 표준:가능 여부 / 금지:가능여부 / 기준:가능한지 여부를 지칭할 때 사용\n- 표준:등록된 / 금지:등록 된 / 기준:피동 표현은 붙여쓰기 사용\n- 표준:변경할 / 금지:변경 할 / 기준:관형형 표현은 붙여쓰기 사용\n- 표준:상세 화면 / 금지:상세화면 / 기준:화면구분 또는 예상 결과에서 화면 단위를 표현할 때 사용\n- 표준:테이블 / 금지:그리드 / 기준:일반 화면의 표 형태 데이터에 사용\n\n## 좋은 TC 샘플\n화면구분1\t화면구분2\t테스트구분\t테스트시나리오\t예상결과\n공지사항\t조회 조건\t조회\t조회 조건 선택 후 [조회] 버튼 선택\t일자, 제목, 작성자 데이터 정상 노출\n거래 내역\t조회 조건\t조회\t조회 기간 선택 후 [조회] 버튼 선택\t거래일, 종목명, 거래금액, 처리상태 데이터 정상 노출\n신청 내역\t조회 조건\t조회\t상 보 | 목록 | UI | 목록 항목 선택 | 상세 화면 정상 호출\n\n## 주의사항\n- 화면에서 확인 불가한 항목은 추정 금지, \"확인 불가\"로 분리\n- AI 결과는 TC 초안이므로 담당자 검수 필수\n- 최종 출력은 TSV 형식 (탭 구분, 헤더 포함)"};

let loadedImages = [];
let chatHistory = [];
let isLoading = false;

}

}

function clearAll() {
  loadedImages = []; chatHistory = [];
  document.getElementById('imageBar').classList.remove('visible');
  document.getElementById('actionBar').classList.remove('visible');

function showImageBar(img) {
  document.getElementById('imageThumb').src = img.dataUrl || `data:image/png;base64,${img.base64}`;
  document.getElementById('imageName').textContent = img.name || '화면';
  document.getElementById('imageCount').textContent = loadedImages.length > 1 ? `외 ${loadedImages.length-1}개` : '준비 완료';
  document.getElementById('imageBar').classList.add('visible');
  document.getElementById('actionBar').classList.add('visible');
}

// AI 호출
async function callAI(stepId, sysPrompt, userMsg, imgObj) {
  addTyping(stepId);
  const content = [];
  if (imgObj) {
    const mime = imgObj.mime || 'image/png';
    content.push({ type: 'image_url', image_url: { url: `data:${mime};base64,${imgObj.base64}`, detail: 'high' } });
  }
  content.push({ type: 'text', text: userMsg });
  const apiKey = document.getElementById('apiKey').value.trim();
  const res = await fetch('https://api.openai.com/v1/chat/completions', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
    body: JSON.stringify({
      model: 'gpt-4o',
      messages: [{ role: 'system', content: sysPrompt }, { role: 'user', content }],
      temperature: 0.1, max_tokens: 4000
    })
  });
  removeTyping(stepId);
  if (!res.ok) { const e = await res.json(); throw new Error(e.error?.message || `HTTP ${res.status}`); }
  const d = await res.json();
  return d.choices[0].message.content;
}

// ── 검토 기능 ──
async function runReview() {
  if (!checkReady()) return;
  isLoading = true; setDisabled(true);
  removeEmpty();
  addBubble('user', `[${selectedChannel}] 검토 시작`);

  try {
    const sys = getSystemPrompt();
    const img = loadedImages[0];

    setStatus('화면 분석 중...');
    const result = await callAI('r1', sys,
      '이 화면 캡처를 TC 작성 규칙 관점에서 검토해주세요.\n\n다음을 확인하세요:\n1. 어떤 TC를 작성해야 하는지 (작성 대상)\n2. 제외 대상 (제외규칙 기준)\n3. 각 항목의 테스트 구분 (UI/조회/처리)\n4. 주의할 용어 (용어사전 기준)\n5. 확인 불가 항목\n\n검토 결과를 항목별로 정리해주세요.',
      img);

    addBubble('assistant', result, true);
    chatHistory.push({ role: 'assistant', text: result });
    setStatus('');
  } catch(e) {
    setStatus('오류: ' + e.message, true);
  } finally {
    isLoading = false; setDisabled(false);
  }
}

// ── 초안 작성 기능 ──
async function runDraft() {
  if (!checkReady()) return;
  isLoading = true; setDisabled(true);
  removeEmpty();
  addBubble('user', `[${selectedChannel}] TC 초안 작성`);

  try {
    const sys = getSystemPrompt();
    const img = loadedImages[0];

    // 1단계: 화면 해석 + 대상 선별
    setStatus('1/2 화면 분석 중...');
    const step1 = await callAI('d1', sys,
      '이 화면 캡처를 분석하여 TC 작성 대상과 제외 대상을 선별하고, 각 항목의 테스트 구분(UI/조회/처리)을 결정해주세요.',
      img);

    // 2단계: TC 초안 작성
    setStatus('2/2 TC 작성 중...');
    const step2 = await callAI('d2', sys,
      `아래 분석 결과를 바탕으로 TC 초안을 작성하세요.\n\n규칙:\n- 출력은 TSV 형식만 (탭 구분)\n- 헤더: 화면구분1\t화면구분2\t테스트 구분\t테스트 시나리오\t예상 결과\n- 작성규칙, 용어사전, 나쁜TC 패턴 준수\n\n분석 결과:\n${step1}`,
      null);

    addBubble('assistant', step2, true, true);
    chatHistory.push({ role: 'assistant', text: step2 });
    setStatus('');
  } catch(e) {
    setStatus('오류: ' + e.message, true);
  } finally {
    isLoading = false; setDisabled(false);
  }
}

// ── 추가 질문 전송 ──
async function sendMessage() {
  if (isLoading) return;
  const apiKey = document.getElementById('apiKey').value.trim();
  if (!apiKey) { alert('API 키를 먼저 입력하세요'); return; }
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text) return;

  input.value = ''; input.style.height = 'auto';
  isLoading = true; setDisabled(true);
  removeEmpty();
  addBubble('user', text);
  chatHistory.push({ role: 'user', text });

  try {
    const sys = getSystemPrompt();
    const img = loadedImages.length > 0 ? loadedImages[0] : null;
    const result = await callAI('m1', sys, text, img);
    addBubble('assistant', result, true);
    chatHistory.push({ role: 'assistant', text: result });
    setStatus('');
  } catch(e) {
    setStatus('오류: ' + e.message, true);
  } finally {
    isLoading = false; setDisabled(false);
  }
}

// ── 버블 렌더링 ──
function addBubble(role, text, showActions, isTsv) {
  const ca = document.getElementById('chatArea');
  const wrap = document.createElement('div');
  wrap.className = 'bubble-wrap';

  const bubble = document.createElement('div');
  bubble.className = `bubble ${role}`;

  if (isTsv && text.includes('\t')) {
    // TSV 테이블 렌더링
    const lines = text.split('\n').filter(l => l.trim());
    const table = document.createElement('table');
    table.className = 'tsv-table';
    lines.forEach((line, i) => {
      const cells = line.split('\t');
      const tr = document.createElement('tr');
      cells.forEach(cell => {
        const td = document.createElement(i === 0 ? 'th' : 'td');
        td.textContent = cell.trim();
        tr.appendChild(td);
      });
      table.appendChild(tr);
    });
    bubble.appendChild(table);
    bubble.style.padding = '8px';
    bubble.style.maxWidth = '100%';
  } else {
    bubble.textContent = text;
  }

  wrap.appendChild(bubble);

  if (showActions && role === 'assistant') {
    const actions = document.createElement('div');
    actions.className = 'bubble-actions';
    actions.dataset.text = text;
    let btns = `<button class="action-btn" onclick="copyText(this)">📋 복사</button>`;
    if (text.includes('\t')) {
      btns = `<button class="action-btn primary" onclick="copyTsv(this)">📊 Google Sheets 복사</button>` + btns;
    }
    actions.innerHTML = btns;
    wrap.appendChild(actions);
  }

  ca.appendChild(wrap);
  ca.scrollTop = ca.scrollHeight;
}

function addTyping(id) {
  const ca = document.getElementById('chatArea');
  const b = document.createElement('div');
  b.className = 'bubble typing'; b.id = 'typing_' + id;
  b.innerHTML = '<span class="spinner"></span>처리 중...';
  ca.appendChild(b); ca.scrollTop = ca.scrollHeight;
}
function removeTyping(id) { const b = document.getElementById('typing_' + id); if (b) b.remove(); }

function copyText(btn) {
  const text = btn.closest('.bubble-wrap').querySelector('.bubble-actions').dataset.text;
  navigator.clipboard.writeText(text).then(() => { btn.textContent = '✅ 복사됨'; setTimeout(() => btn.textContent = '📋 복사', 1500); });
}
function copyTsv(btn) {
  const text = btn.closest('.bubble-wrap').querySelector('.bubble-actions').dataset.text;
  navigator.clipboard.writeText(text).then(() => { btn.textContent = '✅ 복사됨'; setTimeout(() => btn.textContent = '📊 Google Sheets 복사', 1500); });
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}
function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 80) + 'px';
}
function setStatus(msg, isErr) {
  const b = document.getElementById('statusBar');
  b.textContent = msg; b.className = 'status-bar' + (isErr ? ' error' : '');
}
function setDisabled(v) {
  document.getElementById('btnSend').disabled = v;
  document.getElementById('btnReview').disabled = v;
  document.getElementById('btnDraft').disabled = v;
  document.getElementById('btnFigma').disabled = v;
}
function removeEmpty() {
  const e = document.getElementById('emptyState'); if (e) e.remove();
}
function checkReady() {
  if (!document.getElementById('apiKey').value.trim()) { alert('API 키를 먼저 입력하세요'); return false; }
  if (!loadedImages.length) { alert('피그마에서 화면을 먼저 가져오세요'); return false; }
  if (isLoading) return false;
  return true;
}

// 피그마 메시지 수신
window.onmessage = (event) => {
  const msg = event.data.pluginMessage;
  if (!msg) return;
  const btn = document.getElementById('btnFigma');

  if (msg.type === 'load-key') document.getElementById('apiKey').value = msg.key;

  if (msg.type === 'selection-changed') {
    if (msg.count > 0) {
      btn.textContent = `📐 "${msg.name.slice(0,8)}"`;
      btn.style.background = '#e8f5e9'; btn.style.color = '#2e7d32'; btn.style.borderColor = '#81c784';
    } else {
      btn.textContent = '📐 피그마';
      btn.style.background = ''; btn.style.color = ''; btn.style.borderColor = '';
    }
  }

  if (msg.type === 'extract-progress') {
    btn.disabled = true; btn.textContent = '⏳';
    setStatus(msg.message);
  }

  if (msg.type === 'extracted') {
    btn.disabled = false; btn.textContent = '📐 피그마';
    btn.style.background = ''; btn.style.color = ''; btn.style.borderColor = '';
    loadedImages = msg.images.map(img => ({ ...img, dataUrl: `data:${img.mime||'image/png'};base64,${img.base64}` }));
    chatHistory = [];
    showImageBar(loadedImages[0]);
    removeEmpty();
    addBubble('assistant', `화면 ${loadedImages.length}개를 가져왔습니다.\n검토 또는 초안 작성 버튼을 눌러주세요.`, false);
    setStatus('');
  }

  if (msg.type === 'extract-error') {
    btn.disabled = false; btn.textContent = '📐 피그마';
    setStatus('⚠️ ' + msg.message, true);
  }
};
</script>
