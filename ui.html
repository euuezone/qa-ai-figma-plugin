function escHtml(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderReview(data) {
  lastReviewData = data;
  const ca = document.getElementById('chatArea');
  const { table, issues } = data;

  if (!table || !table.length) {
    addBubble('asst', 'TC 테이블을 인식하지 못했습니다. 이미지에 TC 표가 포함되어 있는지 확인해주세요.', true);
    return;
  }

  // issue map: "row,col" → issue object (실제 변경된 것만)
  const imap = {};
  (issues || []).forEach(is => { imap[`${is.row},${is.col}`] = is; });
  const cnt = (issues || []).filter(
    is => is.original.trim() !== is.corrected.trim()
  ).length;

  const wrap = document.createElement('div');
  wrap.className = 'bwrap';

  // 수정 건수 배지
  const meta = document.createElement('div');
  meta.className = 'review-meta';
  if (cnt > 0) {
    meta.innerHTML = `<span class="review-badge has-issues">${cnt}개 수정</span>빨간색 항목이 수정된 부분입니다`;
  } else {
    meta.innerHTML = `<span class="review-badge no-issues">이상 없음</span>모든 TC가 작성 규칙에 부합합니다`;
  }
  wrap.appendChild(meta);

  // 테이블
  const bubble = document.createElement('div');
  bubble.className = 'bubble asst';
  bubble.style.padding = '6px';
  bubble.style.whiteSpace = 'normal';

  const tbl = document.createElement('table');
  tbl.className = 'tsv';

  table.forEach((row, ri) => {
    const tr = document.createElement('tr');
    row.forEach((cell, ci) => {
      const tag = ri === 0 ? 'th' : 'td';
      const el = document.createElement(tag);
      const issue = imap[`${ri},${ci}`];

      const realChange = issue &&
        issue.original.trim() !== issue.corrected.trim();

      if (realChange) {
        el.className = 'cell-issue';
        el.innerHTML =
          `<del>${escHtml(issue.original)}</del>` +
          `<span class="fix-arrow">→</span>` +
          `<span class="fix-text">${escHtml(issue.corrected)}</span>`;
        if (issue.reason) el.title = issue.reason;
      } else {
        el.textContent = issue ? issue.corrected : cell;
      }
      tr.appendChild(el);
    });
    tbl.appendChild(tr);
  });

  bubble.appendChild(tbl);
  wrap.appendChild(bubble);

  // 복사 버튼
  const acts = document.createElement('div');
  acts.className = 'bacts';
  const tsv = table.map(r => r.join('\t')).join('\n');
  acts.dataset.text = tsv;
  acts.innerHTML =
    `<button class="abtn prim" onclick="copyTsv(this)">${IC_TABLE} Sheets 복사</button>` +
    `<button class="abtn" onclick="pasteToFigma()">${IC_FIG} 피그마에 붙여넣기</button>`;
  wrap.appendChild(acts);

  ca.appendChild(wrap);
  ca.scrollTop = ca.scrollHeight;
}

function addBubble(role, text, showActions, isTsv) {
  const ca = document.getElementById('chatArea');
  const wrap = document.createElement('div');
  wrap.className = 'bwrap';
  const bbl = document.createElement('div');
  bbl.className = `bubble ${role}`;

  if (isTsv && text.includes('\t')) {
    const lines = text.split('\n').filter(l => l.trim());
    const tbl = document.createElement('table');
    tbl.className = 'tsv';
    lines.forEach((line, i) => {
      const cells = line.split('\t');
      const tr = document.createElement('tr');
      cells.forEach(cell => {
        const td = document.createElement(i === 0 ? 'th' : 'td');
        td.textContent = cell.trim();
        tr.appendChild(td);
      });
      tbl.appendChild(tr);
    });
    bbl.appendChild(tbl);
    bbl.style.padding = '6px';
  } else {
    bbl.textContent = text;
  }

  wrap.appendChild(bbl);

  if (showActions && role === 'asst') {
    const acts = document.createElement('div');
    acts.className = 'bacts';
    acts.dataset.text = text;
    let btns = `<button class="abtn" onclick="copyText(this)">${IC_COPY} 복사</button>`;
    if (text.includes('\t')) {
      btns = `<button class="abtn prim" onclick="copyTsv(this)">${IC_TABLE} Sheets 복사</button>` + btns;
    }
    acts.innerHTML = btns;
    wrap.appendChild(acts);
  }

  ca.appendChild(wrap);
  ca.scrollTop = ca.scrollHeight;
}

function addTyping(id) {
  const ca = document.getElementById('chatArea');
  const b = document.createElement('div');
  b.className = 'bubble typing'; b.id = 'typing_' + id;
  b.innerHTML = '<div class="dots"><span></span><span></span><span></span></div>';
  ca.appendChild(b); ca.scrollTop = ca.scrollHeight;
}
function removeTyping(id) { const b = document.getElementById('typing_' + id); if (b) b.remove(); }

function doCopy(text) {
  /* Figma iframe에서 navigator.clipboard 권한 없는 경우 대비 fallback */
  try {
    if (navigator.clipboard && navigator.clipboard.writeText) {
      return navigator.clipboard.writeText(text);
    }
  } catch(e) {}
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.cssText = 'position:fixed;top:0;left:0;opacity:0;pointer-events:none';
  document.body.appendChild(ta);
  ta.focus(); ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);
  return Promise.resolve();
}

function copyText(btn) {
  const text = btn.closest('.bwrap').querySelector('.bacts').dataset.text;
  doCopy(text).then(() => {
    btn.innerHTML = `${IC_COPY} 복사됨`;
    setTimeout(() => { btn.innerHTML = `${IC_COPY} 복사`; }, 1500);
  });
}
function copyTsv(btn) {
  const text = btn.closest('.bwrap').querySelector('.bacts').dataset.text;
  doCopy(text).then(() => {
    btn.innerHTML = `${IC_TABLE} 복사됨`;
    setTimeout(() => { btn.innerHTML = `${IC_TABLE} Sheets 복사`; }, 1500);
  });
}

function pasteToFigma() {
  if (!lastReviewData) return;
  parent.postMessage({ pluginMessage: { type: 'paste-review', data: lastReviewData } }, '*');
  setStatus('피그마에 붙여넣는 중...', false, true);
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}
function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 72) + 'px';
}

function setStatus(msg, isErr, isBusy) {
  const bar  = document.getElementById('statusBar');
  const text = document.getElementById('statusText');
  const dot  = document.getElementById('statusDot');
  text.textContent = msg || '';
  bar.className = 'sb' + (isErr ? ' err' : '') + (isBusy ? ' busy' : '');
  dot.className  = 'sb-dot' + (isBusy ? ' busy' : '');
}

function setDisabled(v) {
  document.getElementById('btnSend').disabled = v;
  document.getElementById('btnFigma').disabled = v;
  if (v) {
    document.getElementById('btnReview').disabled = true;
    document.getElementById('btnDraft').disabled = true;
  } else {
    const hasImg = loadedImages.length > 0;
    document.getElementById('btnReview').disabled = !hasImg && !pastedTCText;
    document.getElementById('btnDraft').disabled = !hasImg;
  }
}

function removeEmpty() {
  const e = document.getElementById('emptyState'); if (e) e.remove();
}

function checkReady() {
  if (!document.getElementById('apiKey').value.trim()) { alert('API 키를 먼저 입력하세요'); return false; }
  if (!loadedImages.length && !getTCText()) { alert('피그마 화면을 가져오거나 TC 텍스트를 붙여넣어 주세요'); return false; }
  if (isLoading) return false;
  return true;
}

window.onmessage = (event) => {
  const msg = event.data.pluginMessage;
  if (!msg) return;
  const btn = document.getElementById('btnFigma');

  if (msg.type === 'load-key') document.getElementById('apiKey').value = msg.key;

  if (msg.type === 'selection-changed') {
    if (msg.count > 0) {
      btn.innerHTML = `${IC_FIG} ${msg.name}`;
      btn.classList.add('active');
    } else {
      btn.innerHTML = `${IC_FIG} 피그마`;
      btn.classList.remove('active');
    }
  }

  if (msg.type === 'extract-progress') {
    btn.disabled = true;
    btn.innerHTML = `${IC_FIG} 불러오는 중`;
    setStatus(msg.message, false, true);
  }

  if (msg.type === 'extracted') {
    loadedImages = msg.images.map(img => ({
      ...img, dataUrl: `data:${img.mime || 'image/png'};base64,${img.base64}`
    }));
    chatHistory = [];
    showImageBar(loadedImages[0]);
    removeEmpty();

    const cnt = loadedImages.length;
    const IC_CHECK = `<svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M2 5.5L4 7.5L8 3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
    btn.disabled = false;
    btn.innerHTML = `${IC_CHECK} 화면 ${cnt}개 불러왔어요`;
    btn.classList.add('active');

    addBubble('asst', `화면 ${cnt}개를 불러왔습니다. 검토 또는 초안 작성을 눌러주세요.`, false);
    setStatus('');
  }

  if (msg.type === 'extract-error') {
    btn.disabled = false;
    btn.innerHTML = `${IC_FIG} 피그마`;
    btn.classList.remove('active');
    setStatus(msg.message, true);
  }

  if (msg.type === 'paste-success') {
    setStatus('피그마에 붙여넣기 완료!', false, false);
  }

  if (msg.type === 'paste-table-success') {
    setStatus('Figma 표 생성 완료!', false, false);
  }

  if (msg.type === 'paste-table-error') {
    setStatus('표 생성 실패: ' + msg.message, true, false);
  }

  if (msg.type === 'paste-error') {
    setStatus('붙여넣기 실패: ' + msg.message, true, false);
  }

  if (msg.type === 'text-table-extracted') {
    parent.postMessage({ pluginMessage: { type: 'paste-table', data: { table: msg.table } } }, '*');
    setStatus('Figma에 표 만드는 중...', false, true);
  }

  if (msg.type === 'text-table-error') {
    setStatus(msg.message, true, false);
  }
};
</script>
</body>
</html>
